<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wat verandert er als ik meer ga verdienen? — Solidari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --wit:#FAFAF7;--wit-warm:#F5F2EC;
      --amber:#E8A020;--amber-licht:#FDF3E0;--amber-diep:#C47F10;
      --groen:#2D5A3D;--groen-licht:#EBF3EE;
      --tekst:#1A1A18;--tekst-zacht:#5C5C58;--tekst-licht:#9C9C98;
      --rand:#E8E5DE;--rood:#DC2626;--rood-licht:#FEF2F2;
      --blauw:#2563EB;--blauw-licht:#EFF6FF;
      --chat-bg:#EFECE6;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{background:var(--chat-bg);color:var(--tekst);font-family:'Source Sans 3',sans-serif;font-weight:400;display:flex;flex-direction:column;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--rand);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:36px;height:36px;}
    .logo-naam{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--tekst);letter-spacing:-0.02em;}
    .logo-naam span{color:var(--amber);}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none;}
    .nav-links a{text-decoration:none;color:var(--tekst-zacht);font-size:0.9rem;font-weight:500;transition:color 0.2s;}
    .nav-links a:hover{color:var(--tekst);}
    .nav-taal{display:flex;gap:0.4rem;}
    .taal-btn{background:none;border:1px solid var(--rand);border-radius:4px;padding:3px 8px;font-size:0.75rem;cursor:pointer;color:var(--tekst-zacht);font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .taal-btn:hover,.taal-btn.actief{background:var(--amber);border-color:var(--amber);color:white;}

    /* VOORTGANG */
    .voortgang-strip{height:3px;background:var(--rand);flex-shrink:0;}
    .voortgang-vul{height:100%;background:var(--amber);transition:width 0.4s ease;}

    /* CHAT */
    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:680px;margin:0 auto;width:100%;padding:0 1rem;min-height:0;padding-top:64px;}
    .berichten{flex:1;overflow-y:auto;padding:1.2rem 0 0.5rem;display:flex;flex-direction:column;gap:0.6rem;scroll-behavior:smooth;}
    .berichten::-webkit-scrollbar{width:4px;}
    .berichten::-webkit-scrollbar-thumb{background:var(--rand);border-radius:4px;}

    /* BERICHTEN */
    .bericht-sol{display:flex;align-items:flex-end;gap:8px;max-width:88%;align-self:flex-start;animation:inSchuiven 0.25s ease both;}
    .sol-avatar{width:32px;height:32px;background:var(--groen);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
    .bel-sol{background:white;border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:0.92rem;line-height:1.55;color:var(--tekst);box-shadow:0 1px 2px rgba(0,0,0,0.06);}
    .bel-sol.reactie{background:var(--groen-licht);border:1px solid rgba(45,90,61,0.12);font-size:0.85rem;color:var(--tekst-zacht);}
    .bel-sol.info{background:var(--blauw-licht);border:1px solid rgba(37,99,235,0.15);font-size:0.82rem;color:var(--blauw);}
    .bel-sol.waarschuwing{background:var(--rood-licht);border:1px solid rgba(220,38,38,0.15);font-size:0.82rem;color:var(--rood);}
    .bericht-user{align-self:flex-end;max-width:78%;animation:inSchuiven 0.2s ease both;}
    .bel-user{background:var(--groen);border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:0.92rem;color:white;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.1);}

    /* TYPING */
    .typing{display:flex;align-items:flex-end;gap:8px;align-self:flex-start;}
    .typing-dots{background:white;border-radius:18px;padding:12px 16px;display:flex;gap:4px;align-items:center;}
    .typing-dots span{width:6px;height:6px;background:var(--tekst-licht);border-radius:50%;animation:tikken 1.2s infinite;}
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes tikken{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-5px);opacity:1;}}
    @keyframes inSchuiven{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* INVOER */
    .invoer-zone{padding:0.8rem 0 1rem;flex-shrink:0;}
    .keuze-rij{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
    .keuze-btn{background:white;border:1.5px solid var(--rand);border-radius:20px;padding:10px 18px;font-size:0.9rem;font-weight:500;cursor:pointer;color:var(--tekst);font-family:'Source Sans 3',sans-serif;transition:all 0.18s;display:flex;align-items:center;gap:6px;min-height:44px;}
    .keuze-btn:hover{border-color:var(--groen);background:var(--groen-licht);color:var(--groen);}

    /* GETAL INVOER */
    .bedrag-rij{display:flex;gap:8px;align-items:stretch;}
    .bedrag-wrap{flex:1;display:flex;align-items:center;background:white;border:2px solid var(--rand);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
    .bedrag-wrap:focus-within{border-color:var(--amber);}
    .bedrag-prefix{padding:0 14px;font-size:1.2rem;font-weight:600;color:var(--tekst-licht);background:var(--wit-warm);align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--rand);white-space:nowrap;}
    .bedrag-input{flex:1;padding:14px 12px;font-size:1.3rem;border:none;background:transparent;color:var(--tekst);outline:none;font-family:'Source Sans 3',sans-serif;font-weight:500;min-width:0;width:100%;}
    .bedrag-input::placeholder{color:var(--tekst-licht);font-weight:300;}
    /* font-size 16px op mobiel voorkomt iOS-zoom */
    @media(max-width:480px){.bedrag-input{font-size:1rem;padding:14px 10px;}}
    .stuur-btn{padding:0 20px;background:var(--groen);border:none;border-radius:14px;cursor:pointer;color:white;font-size:1.2rem;transition:all 0.18s;display:flex;align-items:center;min-height:54px;min-width:54px;justify-content:center;}
    .stuur-btn:hover{background:#234830;}
    .overslaan-link{text-align:center;font-size:0.78rem;color:var(--tekst-licht);margin-top:6px;cursor:pointer;background:none;border:none;font-family:'Source Sans 3',sans-serif;width:100%;display:block;padding:6px 0;transition:color 0.2s;}
    .overslaan-link:hover{color:var(--tekst-zacht);}
    .invoer-hint{font-size:0.75rem;color:var(--tekst-licht);margin-top:5px;line-height:1.4;}

    /* RESULTAATKAART */
    .res-kaart{background:white;border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:100%;}

    /* Financieel blok */
    .res-fin-header{background:var(--groen);padding:1rem 1.2rem;color:white;}
    .res-fin-titel{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;margin-bottom:2px;}
    .res-fin-sub{font-size:0.75rem;opacity:0.75;}
    .res-vergelijk{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rand);}
    .res-kol{padding:0.9rem 1rem;text-align:center;}
    .res-kol+.res-kol{border-left:1px solid var(--rand);}
    .res-kol-lbl{font-size:0.68rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--tekst-licht);margin-bottom:4px;}
    .res-kol.nieuw .res-kol-lbl{color:var(--groen);}
    .res-kol-getal{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;line-height:1;color:var(--tekst);}
    .res-kol.nieuw .res-kol-getal{color:var(--groen);}
    .res-kol-sub{font-size:0.72rem;color:var(--tekst-licht);margin-top:3px;}
    .res-verschil-rij{display:flex;align-items:center;justify-content:center;gap:8px;padding:0.7rem 1.2rem;border-bottom:1px solid var(--rand);font-size:0.88rem;font-weight:600;}
    .res-verschil-rij.pos{color:var(--groen);}
    .res-verschil-rij.neg{color:var(--rood);}
    .res-verschil-rij.neutr{color:var(--amber-diep);}

    /* Uitsplitsing */
    .res-uitsp{padding:0.4rem 1.2rem 0.8rem;}
    .uitsp-hdr{display:flex;justify-content:space-between;font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--tekst-licht);padding:6px 0 4px;border-bottom:1px solid var(--rand);}
    .uitsp-hdr-bed{display:flex;gap:14px;}
    .uitsp-rij{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--rand);font-size:0.82rem;}
    .uitsp-rij:last-child{border-bottom:none;}
    .uitsp-naam{color:var(--tekst-zacht);display:flex;align-items:center;gap:6px;flex:1;}
    .uitsp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .uitsp-bed{display:flex;gap:14px;flex-shrink:0;}
    .uitsp-oud{color:var(--tekst-licht);font-size:0.78rem;width:64px;text-align:right;}
    .uitsp-nw{font-weight:600;width:64px;text-align:right;}
    .uitsp-rij.totaal .uitsp-naam{font-weight:700;color:var(--tekst);}
    .uitsp-rij.totaal .uitsp-nw{color:var(--groen);}

    /* Scenario-knoppen */
    .res-scenario{padding:0.6rem 1.2rem;border-top:1px solid var(--rand);display:flex;gap:8px;flex-wrap:wrap;}
    .scenario-btn{flex:1;min-width:120px;padding:8px 12px;background:var(--wit-warm);border:1.5px solid var(--rand);border-radius:10px;font-size:0.8rem;font-weight:600;cursor:pointer;color:var(--tekst-zacht);font-family:'Source Sans 3',sans-serif;transition:all 0.18s;text-align:center;min-height:44px;}
    .scenario-btn:hover{border-color:var(--groen);color:var(--groen);background:var(--groen-licht);}

    /* De vier blokken */
    .res-blok{border-top:1px solid var(--rand);}
    .res-blok-header{padding:0.8rem 1.2rem;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
    .res-blok-icoon{font-size:1.2rem;flex-shrink:0;width:28px;text-align:center;}
    .res-blok-titel{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;flex:1;}
    .res-blok-chevron{font-size:0.75rem;color:var(--tekst-licht);transition:transform 0.2s;}
    .res-blok-body{padding:0 1.2rem 1rem;font-size:0.84rem;color:var(--tekst-zacht);line-height:1.65;display:none;}
    .res-blok-body.open{display:block;}
    .res-blok-body ul{margin:0.4rem 0 0 1rem;}
    .res-blok-body li{margin-bottom:4px;}
    .res-blok-body strong{color:var(--tekst);}

    /* Disclaimer + opnieuw */
    .res-disc{padding:0.6rem 1.2rem;font-size:0.7rem;color:var(--tekst-licht);line-height:1.5;border-top:1px solid var(--rand);}
    .res-opnieuw{width:calc(100% - 2.4rem);margin:0.6rem 1.2rem 0.8rem;padding:10px;background:none;border:1px solid var(--rand);border-radius:10px;font-size:0.82rem;cursor:pointer;font-family:'Source Sans 3',sans-serif;color:var(--tekst-licht);transition:all 0.2s;display:block;}
    .res-opnieuw:hover{color:var(--tekst-zacht);border-color:var(--tekst-licht);}

    @media(max-width:480px){
      nav{padding:0 1rem;}
      .nav-links{display:none;}
      .chat-wrap{padding:0 0.6rem;padding-top:64px;}
    }
    @media print{nav,.invoer-zone{display:none;}}
  </style>
</head>

  d.innerHTML = `<div class="bel-user">${tekst}</div>`;
  B().appendChild(d); scrollNaar();
}
async function sol(tekst, ms=320, klasse='') {
  const ty = document.createElement('div');
  ty.className = 'typing';
  ty.innerHTML = `<div class="sol-avatar">☀️</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  B().appendChild(ty); scrollNaar();
  await new Promise(r => setTimeout(r, ms));
  ty.remove();
  return solBericht(tekst, klasse);
}
function toonKeuzes(opties, onKlik) {
  IZ().innerHTML = '';
  const rij = document.createElement('div'); rij.className = 'keuze-rij';
  opties.forEach(o => {
    const b = document.createElement('button'); b.className = 'keuze-btn';
    b.innerHTML = o.label;
    b.onclick = () => { IZ().innerHTML = ''; onKlik(o); };
    rij.appendChild(b);
  });
  IZ().appendChild(rij); scrollNaar();
}
function toonGetalInvoer({prefix='€', placeholder='', hint='', skipLabel='', prefill='', onKlik}) {
  IZ().innerHTML = '';
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="bedrag-rij">
      <div class="bedrag-wrap">
        <div class="bedrag-prefix">${prefix}</div>
        <input type="number" inputmode="numeric" class="bedrag-input" id="g-inp"
          placeholder="${placeholder}" value="${prefill}" min="0" max="9999" autocomplete="off">
      </div>
      <button class="stuur-btn" id="g-stuur">→</button>
    </div>
    ${hint ? `<div class="invoer-hint">${hint}</div>` : ''}
    ${skipLabel ? `<button class="overslaan-link" id="g-skip">${skipLabel}</button>` : ''}`;
  IZ().appendChild(wrap);
  const inp = document.getElementById('g-inp');
  const go = () => { const v = parseFloat(inp.value)||0; IZ().innerHTML=''; onKlik(v, false); };
  document.getElementById('g-stuur').onclick = go;
  inp.onkeydown = e => { if(e.key==='Enter') go(); };
  if(skipLabel) document.getElementById('g-skip').onclick = () => { IZ().innerHTML=''; onKlik(0, true); };
  setTimeout(() => { inp.focus(); }, 100);
  scrollNaar();
}

// ─── BEREKENINGEN ─────────────────────────────────────────────────────────────
function bijstandNorm() {
  const l = S.leeftijd, p = S.partner;
  if (l < 21) return p ? N.bijstand.p18 : N.bijstand.s18;
  return p ? N.bijstand.p21 : N.bijstand.s21;
}
function berekenNetto(bruto) {
  if (bruto <= 0) return 0;
  const bj = bruto * 12, L = N.lh;
  let bel = bj <= L.s1g ? bj*L.s1t : L.s1g*L.s1t + (bj-L.s1g)*L.s2t;
  let ahk = L.ahk;
  if (bj > L.ahk_s) ahk = Math.max(0, L.ahk - (Math.min(bj,L.ahk_e)-L.ahk_s)/(L.ahk_e-L.ahk_s)*L.ahk);
  let ak = 0;
  if (bj <= L.ak_oe) ak = bj/L.ak_oe*L.ak;
  else if (bj <= L.ak_as) ak = L.ak;
  else if (bj <= L.ak_ae) ak = Math.max(0, L.ak*(1-(bj-L.ak_as)/(L.ak_ae-L.ak_as)));
  // Inclusief vakantiegeld (8% bovenop netto)
  return Math.round(Math.max(0, bj - bel + ahk + ak) * 1.08 / 12);
}
function berekenZt(ji) {
  const Z = N.zt, dr = S.partner?Z.dr_p:Z.dr_s, mx = S.partner?Z.mx_p:Z.mx_s;
  return ji >= dr ? 0 : Math.round(mx * (1 - ji/dr));
}
function berekenHt(ji) {
  const H = N.ht, huur = S.huur;
  if (huur > H.max || huur < H.min) return 0;
  const mI = S.partner ? H.maxI_p : H.maxI_s;
  if (ji > mI) return 0;
  const aftop = S.kinderen >= 3 ? H.aftop3 : H.aftop12;
  const nh = S.partner ? H.norm_p : H.norm_s;
  return Math.round(Math.max(0, Math.min(huur,aftop)-nh) * Math.max(0, 1 - Math.max(0,ji-15000)/(mI-15000)));
}
function berekenKgb(ji) {
  if (S.kinderen === 0) return 0;
  const K = N.kgb;
  let b = 0;
  if (S.kinderen >= 1) b += K.k1;
  if (S.kinderen >= 2) b += K.k2;
  if (S.kinderen >= 3) b += K.k3;
  return Math.round(Math.max(0, b - (ji>K.grens ? (ji-K.grens)*K.afbouw : 0)) / 12);
}
function berekenTotaal(jaarinkomen, nettoMnd, bijstandAanv) {
  return nettoMnd + bijstandAanv + berekenZt(jaarinkomen) + berekenHt(jaarinkomen) + berekenKgb(jaarinkomen) + (S.kinderen>0 ? S.kinderen*N.akw : 0);
}

// ─── STAPPEN ──────────────────────────────────────────────────────────────────
async function start() {
  B().innerHTML = ''; IZ().innerHTML = ''; vrtg(0);
  Object.assign(S, {situatie:null,partner:false,kinderen:0,leeftijd:null,huur:0,huidigNetto:0,nieuwBruto:0,uren:40});
  await sol(s('welkom'), 200);
  stap_situatie();
}

async function stap_situatie() {
  vrtg(10);
  await sol(s('q_situatie'), 300);
  toonKeuzes(s('sit').map((l,i) => ({label:l, val:i})), async o => {
    S.situatie = o.val; userBericht(o.label); stap_partner();
  });
}

async function stap_partner() {
  vrtg(22);
  await sol(s('q_partner'), 300);
  toonKeuzes(s('partner').map((l,i) => ({label:l, val:i===1})), async o => {
    S.partner = o.val; userBericht(o.label); stap_kinderen();
  });
}

async function stap_kinderen() {
  vrtg(34);
  await sol(s('q_kinderen'), 300);
  toonKeuzes(s('kind').map((l,i) => ({label:l, val:i})), async o => {
    S.kinderen = o.val; userBericht(o.label); stap_leeftijd();
  });
}

async function stap_leeftijd() {
  vrtg(46);
  await sol(s('q_leeftijd'), 300);
  toonGetalInvoer({
    prefix: '🎂',
    placeholder: s('leeftijd_placeholder'),
    hint: s('leeftijd_hint'),
    onKlik: async (v) => {
      if (v < 16 || v > 110) {
        await sol('Vul een leeftijd in tussen 16 en 110 jaar.', 200, 'waarschuwing');
        stap_leeftijd(); return;
      }
      S.leeftijd = v;
      userBericht(v + ' jaar');
      if (v >= 67) {
        await sol(s('aow_bericht'), 400, 'info');
        vrtg(100); IZ().innerHTML = `<button class="overslaan-link" onclick="start()">↩ ${s('opnieuw')}</button>`;
        return;
      }
      if (v >= 18 && v < 21) await sol(s('jong_bericht'), 400, 'reactie');
      stap_huur();
    }
  });
}

async function stap_huur() {
  vrtg(58);
  await sol(s('q_huur'), 300);
  toonGetalInvoer({
    placeholder: s('huur_placeholder'),
    hint: s('huur_hint'),
    skipLabel: s('huur_skip'),
    onKlik: async (v, skip) => {
      S.huur = skip ? 0 : v;
      userBericht(skip ? s('huur_skip') : fmt(v));
      stap_huidig();
    }
  });
}

async function stap_huidig() {
  vrtg(68);
  // Als bijstand: geef bijstandsnorm als suggestie
  const norm = bijstandNorm();
  const prefill = S.situatie === 0 ? Math.round(norm) : '';
  if (S.situatie === 0) {
    await sol(`Je bijstandsnorm is waarschijnlijk ongeveer <strong>${fmt(norm)}/mnd</strong>. Klopt dat? Pas het aan als je situatie anders is.`, 350, 'reactie');
  }
  await sol(s('q_huidig'), 250);
  toonGetalInvoer({
    placeholder: s('huidig_placeholder'),
    hint: s('huidig_hint'),
    prefill: prefill,
    onKlik: async (v) => {
      S.huidigNetto = v;
      userBericht(fmt(v) + '/mnd');
      stap_uren();
    }
  });
}

async function stap_uren() {
  vrtg(78);
  await sol(s('q_uren'), 300);
  await sol(s('uren_hint'), 200, 'reactie');
  toonKeuzes(
    s('uren').map((l,i) => ({label:l, val:[12,20,32,40][i]})),
    async o => {
      S.uren = o.val; userBericht(o.label);
      // Auto-invullen minimumloon
      S.nieuwBruto = Math.round(N.wml * o.val * (52/12));
      stap_bruto();
    }
  );
}

async function stap_bruto() {
  vrtg(88);
  await sol(s('q_nieuw'), 300);
  toonGetalInvoer({
    placeholder: s('nieuw_placeholder'),
    hint: s('nieuw_hint'),
    prefill: S.nieuwBruto,
    onKlik: async (v) => {
      if (v <= 0) { await sol('Vul een bedrag in groter dan 0.', 200, 'waarschuwing'); stap_bruto(); return; }
      S.nieuwBruto = v;
      userBericht(fmt(v) + ' bruto/mnd');
      stap_berekenen();
    }
  });
}

// ─── BEREKENEN + RESULTAAT ────────────────────────────────────────────────────
async function stap_berekenen() {
  vrtg(95);
  await sol(s('rekenen'), 500);
  toonResultaat();
}

function toonResultaat(extra=0) {
  // Huidig totaal = wat de gebruiker opgaf
  const totOud = S.huidigNetto;

  // Nieuw: netto salaris + eventuele bijstandsaanvulling + toeslagen
  const nettoNw = berekenNetto(S.nieuwBruto + extra);
  const brutoNwJaar = (S.nieuwBruto + extra) * 12;
  const norm = bijstandNorm();
  const bijstandAanv = S.situatie === 0 ? Math.max(0, norm - nettoNw) : 0;
  const totNw = nettoNw + bijstandAanv
    + berekenZt(brutoNwJaar)
    + berekenHt(brutoNwJaar)
    + berekenKgb(brutoNwJaar)
    + (S.kinderen > 0 ? S.kinderen * N.akw : 0);

  // Toeslagen huidig (op basis van opgegeven netto, terugrekenen naar jaarinkomen)
  // We benaderen huidig jaarinkomen als netto * 12 / 1.08 (excl. VG) voor toeslagenberekening
  const huidigJaar = S.huidigNetto * 12 / 1.08;
  const ztOud = berekenZt(huidigJaar);
  const htOud = berekenHt(huidigJaar);
  const kgbOud = berekenKgb(huidigJaar);
  const akw = S.kinderen > 0 ? S.kinderen * N.akw : 0;

  const ztNw = berekenZt(brutoNwJaar);
  const htNw = berekenHt(brutoNwJaar);
  const kgbNw = berekenKgb(brutoNwJaar);

  const verschil = totNw - totOud;
  let vKls, vTxt;
  if (verschil > 30) { vKls='pos'; vTxt=s('verschil_pos').replace('{x}', fmt(verschil)); }
  else if (verschil < -30) { vKls='neg'; vTxt=s('verschil_neg').replace('{x}', fmt(Math.abs(verschil))); }
  else { vKls='neutr'; vTxt=s('verschil_neutr'); }

  // Uitsplitsing rijen
  function rij(kleur, naam, oud, nw, noot='') {
    const nwKleur = nw>oud ? 'color:var(--groen)' : nw<oud ? 'color:var(--rood)' : '';
    return `<div class="uitsp-rij">
      <div class="uitsp-naam"><div class="uitsp-dot" style="background:${kleur};border:1px solid var(--rand)"></div>
      ${naam}${noot?`<span style="font-size:.68rem;color:var(--tekst-licht);margin-left:4px">(${noot})</span>`:''}</div>
      <div class="uitsp-bed">
        <div class="uitsp-oud">${oud>0?fmt(oud):'—'}</div>
        <div class="uitsp-nw" style="${nwKleur}">${nw>0?fmt(nw):'—'}</div>
      </div></div>`;
  }
  function rijVast(kleur, naam, bed) {
    return `<div class="uitsp-rij">
      <div class="uitsp-naam"><div class="uitsp-dot" style="background:${kleur};border:1px solid var(--rand)"></div>
      ${naam}<span style="font-size:.68rem;color:var(--tekst-licht);margin-left:4px">(${s('ongewijzigd')})</span></div>
      <div class="uitsp-bed"><div class="uitsp-oud">${bed>0?fmt(bed):'—'}</div><div class="uitsp-nw">${bed>0?fmt(bed):'—'}</div></div>
    </div>`;
  }

  const huurNoot = S.huur<454||S.huur>880 ? s('huur_buiten') : '';

  // Vier blokken (inklapbaar)
  function blok(id, titel, inhoud) {
    return `<div class="res-blok">
      <div class="res-blok-header" onclick="toggleBlok('${id}')">
        <div class="res-blok-titel">${titel}</div>
        <div class="res-blok-chevron" id="chev-${id}">▸</div>
      </div>
      <div class="res-blok-body" id="blok-${id}">${inhoud}</div>
    </div>`;
  }

  const blok1 = `<p>Hierboven zie je het volledige overzicht: wat je nu ontvangt en wat er verandert in elke inkomstenbron.</p>
    ${verschil < -30 ? `<p style="margin-top:8px">Het netto-effect is tijdelijk negatief — dat heet de armoedeval. Vraag bij je gemeente naar de <strong>vrijlating van arbeidsinkomen</strong>: de eerste 6 maanden mag je een deel van je verdiensten houden bovenop je bijstandsaanvulling. Ook de <strong>Participatietoeslag</strong> kan van toepassing zijn.</p>` : ''}`;

  const blok2 = `<p>${s('blok2_basis')}</p><ul>
    <li>${s('blok2_ww')}</li>
    <li>${s('blok2_pensioen')}</li>
    <li>${s('blok2_ziekte')}</li>
    <li>${s('blok2_loopbaan')}</li></ul>`;

  const blok3 = `<p>${s('blok3_basis')}</p><ul>
    <li>${s('blok3_structuur')}</li>
    <li>${s('blok3_contact')}</li>
    <li>${s('blok3_zelf')}</li></ul>`;

  const blok4 = `<p>${s('blok4_basis')}</p><ul>
    <li>${s('blok4_cv')}</li>
    <li>${s('blok4_loon')}</li>
    <li>${s('blok4_doorgroei')}</li></ul>`;

  // Scenario-knoppen
  const uren = S.uren;
  const minUren = uren <= 12;
  const maxUren = uren >= 40;
  const stapGrote = Math.round(N.wml * 8 * (52/12)); // 8 uur meer/minder

  const kaart = document.createElement('div');
  kaart.className = 'bericht-sol'; kaart.style.maxWidth = '100%';
  kaart.innerHTML = `<div class="sol-avatar">☀️</div>
  <div class="res-kaart">
    <div class="res-fin-header">
      <div class="res-fin-titel">💶 ${s('res_titel')}</div>
      <div class="res-fin-sub">${s('res_mnd')}</div>
    </div>
    <div class="res-vergelijk">
      <div class="res-kol">
        <div class="res-kol-lbl">${s('res_oud_lbl')}</div>
        <div class="res-kol-getal">${fmt(totOud)}</div>
        <div class="res-kol-sub">${s('res_mnd')}</div>
      </div>
      <div class="res-kol nieuw">
        <div class="res-kol-lbl">${s('res_nw_lbl')}</div>
        <div class="res-kol-getal">${fmt(totNw)}</div>
        <div class="res-kol-sub">${s('res_mnd')}</div>
      </div>
    </div>
    <div class="res-verschil-rij ${vKls}">${vTxt}</div>
    <div class="res-uitsp">
      <div class="uitsp-hdr">
        <span>${s('uitsp_bron')}</span>
        <div class="uitsp-hdr-bed"><span style="width:64px;text-align:right">${s('uitsp_oud')}</span><span style="width:64px;text-align:right">${s('uitsp_nw')}</span></div>
      </div>
      ${rij('#EBF3EE', s('netto_sal'), 0, nettoNw)}
      ${S.situatie===0 ? rij('#F5F2EC', s('bijstand_lbl'), Math.max(0,norm-S.huidigNetto), bijstandAanv) : ''}
      ${rij('#FDF3E0', s('zt_lbl'), ztOud, ztNw)}
      ${S.huur>0 ? rij('#EFF6FF', s('ht_lbl'), htOud, htNw, huurNoot) : ''}
      ${S.kinderen>0 ? rij('#F5F3FF', s('kgb_lbl'), kgbOud, kgbNw) : ''}
      ${S.kinderen>0 ? rijVast('#FFE4F0', s('akw_lbl'), akw) : ''}
      <div class="uitsp-rij totaal">
        <div class="uitsp-naam"><strong>Totaal</strong></div>
        <div class="uitsp-bed">
          <div class="uitsp-oud"><strong>${fmt(totOud)}</strong></div>
          <div class="uitsp-nw">${fmt(totNw)}</div>
        </div>
      </div>
    </div>
    <div class="res-scenario">
      ${!minUren ? `<button class="scenario-btn" onclick="scenarioUren(-8)">${s('scenario_minder')}</button>` : ''}
      ${!maxUren ? `<button class="scenario-btn" onclick="scenarioUren(8)">${s('scenario_meer')}</button>` : ''}
      <button class="scenario-btn" onclick="start()">${s('scenario_opnieuw')}</button>
    </div>
    ${blok('fin', s('blok1_titel'), blok1)}
    ${blok('recht', s('blok2_titel'), blok2)}
    ${blok('leven', s('blok3_titel'), blok3)}
    ${blok('toekomst', s('blok4_titel'), blok4)}
    <div class="res-disc">${s('disclaimer')}</div>
  </div>`;
  B().appendChild(kaart);

  sol(s('advies'), 600, 'reactie');
  vrtg(100);
  IZ().innerHTML = `<div style="text-align:center;padding:.5rem 0"><button class="overslaan-link" onclick="start()">↩ ${s('opnieuw')}</button></div>`;
  scrollNaar();
}

// Scenario: meer/minder uren — herbereken zonder opnieuw vragen
function scenarioUren(delta) {
  const nieuweUren = Math.max(8, Math.min(40, S.uren + delta));
  S.uren = nieuweUren;
  S.nieuwBruto = Math.round(N.wml * nieuweUren * (52/12));
  // Verwijder vorige resultaatkaart
  const kaarten = B().querySelectorAll('.bericht-sol');
  if (kaarten.length > 0) kaarten[kaarten.length-1].remove();
  // Verwijder advies-bericht
  const berichten = B().querySelectorAll('.bericht-sol');
  if (berichten.length > 0) berichten[berichten.length-1].remove();
  toonResultaat();
}

// Inklapbare blokken
function toggleBlok(id) {
  const body = document.getElementById('blok-' + id);
  const chev = document.getElementById('chev-' + id);
  if (body.classList.contains('open')) {
    body.classList.remove('open'); chev.textContent = '▸';
  } else {
    body.classList.add('open'); chev.textContent = '▾';
    setTimeout(() => B().scrollTo({top:B().scrollHeight, behavior:'smooth'}), 50);
  }
}

// ─── TAAL ─────────────────────────────────────────────────────────────────────
function setTaal(code, btn) {
  taal = code.toLowerCase();
  document.querySelectorAll('.taal-btn').forEach(b => b.classList.remove('actief'));
  if (btn) btn.classList.add('actief');
  if (window.Solidari && Solidari.i18n) Solidari.i18n.passToe(code.toUpperCase());
  start();
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.Solidari && Solidari.i18n) Solidari.i18n.init();
});
