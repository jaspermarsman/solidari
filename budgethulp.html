<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budgethulp — Solidari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    :root {
      --wit:#FAFAF7;--wit-warm:#F5F2EC;
      --amber:#E8A020;--amber-licht:#FDF3E0;--amber-diep:#C47F10;
      --groen:#2D5A3D;--groen-licht:#EBF3EE;
      --tekst:#1A1A18;--tekst-zacht:#5C5C58;--tekst-licht:#9C9C98;
      --rand:#E8E5DE;--rood:#DC2626;--rood-licht:#FEF2F2;
      --blauw:#2563EB;--blauw-licht:#EFF6FF;
      --chat-bg:#EFECE6;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{background:var(--chat-bg);color:var(--tekst);font-family:'Source Sans 3',sans-serif;font-weight:400;display:flex;flex-direction:column;}

    .taal-btn{background:none;border:1px solid var(--rand);border-radius:4px;padding:3px 8px;font-size:0.75rem;cursor:pointer;color:var(--tekst-zacht);font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .taal-btn:hover,.taal-btn.actief{background:var(--amber);border-color:var(--amber);color:white;}

    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:680px;margin:0 auto;width:100%;padding:0 1rem;min-height:0;padding-top:64px;}
    .berichten{flex:1;overflow-y:auto;padding:1.2rem 0 140px;display:flex;flex-direction:column;gap:0.6rem;scroll-behavior:smooth;}
    .invoer-inner{max-width:680px;margin:0 auto;width:100%;}
    .berichten::-webkit-scrollbar{width:4px;}
    .berichten::-webkit-scrollbar-thumb{background:var(--rand);border-radius:4px;}

    .bericht-sol{display:flex;align-items:flex-end;gap:8px;max-width:88%;align-self:flex-start;animation:inSchuiven 0.25s ease both;}
    .sol-avatar{width:32px;height:32px;background:var(--groen);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
    .bel-sol{background:white;border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:0.92rem;line-height:1.55;color:var(--tekst);box-shadow:0 1px 2px rgba(0,0,0,0.06);}
    .bel-sol.reactie{background:var(--groen-licht);border:1px solid rgba(45,90,61,0.12);font-size:0.85rem;color:var(--tekst-zacht);}
    .bel-sol.nibud{background:var(--amber-licht);border:1px solid rgba(232,160,32,0.2);font-size:0.82rem;color:var(--amber-diep);}
    .bel-sol.toeslag{background:var(--blauw-licht);border:1px solid rgba(37,99,235,0.15);font-size:0.82rem;color:var(--blauw);}
    .bel-sol.waarschuwing{background:var(--rood-licht);border:1px solid rgba(220,38,38,0.15);font-size:0.82rem;color:var(--rood);}

    .bericht-user{align-self:flex-end;max-width:78%;animation:inSchuiven 0.2s ease both;}
    .bel-user{background:var(--groen);border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:0.92rem;color:white;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.1);}

    .typing{display:flex;align-items:flex-end;gap:8px;align-self:flex-start;}
    .typing-dots{background:white;border-radius:18px;padding:12px 16px;display:flex;gap:4px;align-items:center;}
    .typing-dots span{width:6px;height:6px;background:var(--tekst-licht);border-radius:50%;animation:tikken 1.2s infinite;}
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes tikken{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-5px);opacity:1;}}
    @keyframes inSchuiven{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .invoer-zone{padding:0.8rem 0.8rem 1rem;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--chat-bg);border-top:1px solid var(--rand);}
    .invoer-zone:empty{border-top:none;padding:0;}

    .keuze-rij{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
    .keuze-btn{background:white;border:1.5px solid var(--rand);border-radius:20px;padding:8px 16px;font-size:0.88rem;font-weight:500;cursor:pointer;color:var(--tekst);font-family:'Source Sans 3',sans-serif;transition:all 0.18s;display:flex;align-items:center;gap:6px;}
    .keuze-btn:hover{border-color:var(--groen);background:var(--groen-licht);color:var(--groen);}

    .janee-rij{display:flex;gap:10px;margin-bottom:8px;}
    .ja-btn,.nee-btn{flex:1;padding:12px;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;border:2px solid var(--rand);background:white;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .ja-btn:hover{border-color:var(--groen);background:var(--groen-licht);}
    .nee-btn:hover{border-color:var(--rood);background:var(--rood-licht);}

    /* Bedrag invoer */
    .bedrag-rij{display:flex;gap:8px;align-items:stretch;}
    .bedrag-wrap{flex:1;display:flex;align-items:center;background:white;border:2px solid var(--rand);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
    .bedrag-wrap:focus-within{border-color:var(--amber);}
    .bedrag-euro{padding:0 14px;font-size:1.3rem;font-weight:600;color:var(--tekst-licht);background:var(--wit-warm);align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--rand);}
    .bedrag-input{flex:1;padding:14px 12px;font-size:1.3rem;border:none;background:transparent;color:var(--tekst);outline:none;font-family:'Source Sans 3',sans-serif;font-weight:500;width:80px;}
    .bedrag-input::placeholder{color:var(--tekst-licht);font-weight:300;}
    .stuur-btn{padding:0 20px;background:var(--groen);border:none;border-radius:14px;cursor:pointer;color:white;font-size:1.2rem;transition:all 0.18s;display:flex;align-items:center;}
    .stuur-btn:hover{background:#234830;}

    /* Naam + bedrag combo */
    .naam-bedrag-wrap{display:flex;gap:8px;align-items:stretch;background:white;border:2px solid var(--rand);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
    .naam-bedrag-wrap:focus-within{border-color:var(--amber);}
    .naam-input{flex:2;padding:14px 12px;font-size:1rem;border:none;background:transparent;color:var(--tekst);outline:none;font-family:'Source Sans 3',sans-serif;}
    .naam-input::placeholder{color:var(--tekst-licht);}
    .naam-sep{width:1px;background:var(--rand);align-self:stretch;}
    .naam-euro{padding:0 10px;font-size:1.1rem;font-weight:600;color:var(--tekst-licht);background:var(--wit-warm);align-self:stretch;display:flex;align-items:center;}
    .naam-bedrag-input{flex:1;padding:14px 8px;font-size:1.1rem;border:none;background:transparent;color:var(--tekst);outline:none;font-family:'Source Sans 3',sans-serif;font-weight:500;min-width:60px;}
    .naam-bedrag-input::placeholder{color:var(--tekst-licht);font-weight:300;}

    .overslaan-link{text-align:center;font-size:0.78rem;color:var(--tekst-licht);margin-top:6px;cursor:pointer;background:none;border:none;font-family:'Source Sans 3',sans-serif;width:100%;display:block;transition:color 0.2s;}
    .overslaan-link:hover{color:var(--tekst-zacht);}

    /* Resultaatkaart */
    .resultaat-kaart{background:white;border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:100%;}
    .res-header{background:var(--groen);padding:1rem 1.2rem;color:white;}
    .res-header-titel{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:2px;}
    .res-header-sub{font-size:0.75rem;opacity:0.7;}
    .res-saldo{padding:1rem 1.2rem;text-align:center;border-bottom:1px solid var(--rand);}
    .res-saldo-getal{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1;margin-bottom:4px;}
    .res-saldo.pos .res-saldo-getal{color:var(--groen);}
    .res-saldo.neg .res-saldo-getal{color:var(--rood);}
    .res-saldo-omschr{font-size:0.8rem;color:var(--tekst-licht);}
    .res-pills{display:flex;gap:8px;padding:0.7rem 1.2rem;border-bottom:1px solid var(--rand);flex-wrap:wrap;}
    .res-pill{flex:1;min-width:70px;background:var(--wit-warm);border-radius:10px;padding:8px 10px;text-align:center;}
    .res-pill-label{font-size:0.65rem;color:var(--tekst-licht);text-transform:uppercase;letter-spacing:0.05em;}
    .res-pill-getal{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--tekst);}
    .res-posten{padding:0.6rem 1.2rem;}
    .res-post-rij{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--rand);font-size:0.84rem;}
    .res-post-rij:last-child{border-bottom:none;}
    .res-post-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
    .res-post-naam{flex:1;color:var(--tekst-zacht);}
    .res-post-sub{font-size:0.68rem;color:var(--groen);display:block;}
    .res-post-bedrag{font-weight:600;color:var(--tekst);text-align:right;}
    .res-badge{font-size:0.65rem;font-weight:600;padding:2px 5px;border-radius:4px;margin-left:4px;}
    .res-badge.hoog{background:var(--rood-licht);color:var(--rood);}
    .res-badge.ok{background:var(--groen-licht);color:var(--groen);}
    .res-totaal{display:flex;justify-content:space-between;padding:8px 1.2rem;background:var(--wit-warm);font-weight:600;font-size:0.88rem;border-top:1px solid var(--rand);}

    /* Weekbudget kaart */
    .week-kaart{background:white;border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:100%;margin-top:0;}
    .week-header{background:var(--amber-diep);padding:1rem 1.2rem;color:white;}
    .week-header-titel{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:2px;}
    .week-header-sub{font-size:0.75rem;opacity:0.75;}
    .week-dag-blok{padding:0.8rem 1.2rem;background:var(--amber-licht);border-bottom:1px solid rgba(232,160,32,0.2);display:flex;align-items:center;justify-content:space-between;}
    .week-dag-label{font-size:0.8rem;color:var(--amber-diep);font-weight:500;}
    .week-dag-bedrag{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--amber-diep);}
    .week-categorieen{padding:0.6rem 1.2rem;}
    .week-cat-rij{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--rand);}
    .week-cat-rij:last-child{border-bottom:none;}
    .week-cat-icon{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
    .week-cat-info{flex:1;}
    .week-cat-naam{font-size:0.88rem;color:var(--tekst);font-weight:500;}
    .week-cat-sub{font-size:0.72rem;color:var(--tekst-licht);}
    .week-cat-bedrag{text-align:right;}
    .week-cat-week{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--tekst);}
    .week-cat-dag{font-size:0.72rem;color:var(--tekst-licht);}
    .week-uitleg{padding:0.6rem 1.2rem;font-size:0.75rem;color:var(--tekst-licht);line-height:1.5;border-top:1px solid var(--rand);font-style:italic;}
    .week-nibud-hint{font-size:0.7rem;color:var(--tekst-licht);margin-top:2px;font-style:italic;}
    .week-nibud-hint.hoog{color:var(--amber-diep);}

    .res-acties{padding:0.8rem 1.2rem;display:flex;gap:8px;border-top:1px solid var(--rand);}
    .res-excel-btn{flex:1;padding:10px;background:var(--groen);color:white;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .res-excel-btn:hover{background:#234830;}
    .res-excel-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .res-pdf-btn{flex:1;padding:10px;background:white;color:var(--groen);border:1.5px solid var(--groen);border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .res-pdf-btn:hover{background:var(--groen-licht);}
    .res-pdf-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .res-print-btn{flex:1;padding:10px;background:white;color:var(--groen);border:1.5px solid var(--groen);border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .res-print-btn:hover{background:var(--groen-licht);}
    .res-opnieuw-btn{width:100%;padding:10px;background:none;color:var(--tekst-licht);border:1px solid var(--rand);border-radius:10px;font-size:0.82rem;cursor:pointer;font-family:'Source Sans 3',sans-serif;margin-top:6px;transition:all 0.2s;}
    .res-opnieuw-btn:hover{color:var(--tekst-zacht);border-color:var(--tekst-licht);}
    .res-disclaimer{padding:0.6rem 1.2rem;font-size:0.72rem;color:var(--tekst-licht);line-height:1.5;border-top:1px solid var(--rand);}

    .voortgang-strip{height:3px;background:var(--rand);flex-shrink:0;}
    .voortgang-vul{height:100%;background:var(--amber);transition:width 0.4s ease;}

    /* ── CONTROLESCHERM ── */
    .controle-kaart{background:white;border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);width:100%;}
    .controle-header{background:var(--blauw);padding:0.9rem 1.2rem;color:white;}
    .controle-header-titel{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:2px;}
    .controle-header-sub{font-size:0.75rem;opacity:0.75;}
    .controle-posten{padding:0.5rem 1.2rem;}
    .controle-rij{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--rand);font-size:0.86rem;}
    .controle-rij:last-child{border-bottom:none;}
    .controle-naam{flex:1;color:var(--tekst-zacht);}
    .controle-bedrag{font-weight:600;color:var(--tekst);min-width:60px;text-align:right;}
    .controle-edit{background:none;border:none;cursor:pointer;font-size:0.8rem;color:var(--blauw);padding:2px 6px;border-radius:6px;font-family:'Source Sans 3',sans-serif;transition:all 0.15s;white-space:nowrap;}
    .controle-edit:hover{background:var(--blauw-licht);}
    .controle-acties{padding:0.8rem 1.2rem;display:flex;gap:8px;border-top:1px solid var(--rand);}
    .controle-ok-btn{flex:2;padding:12px;background:var(--groen);color:white;border:none;border-radius:10px;font-size:0.92rem;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .controle-ok-btn:hover{background:#234830;}
    .ai-uitnodiging{background:linear-gradient(135deg,#0F2318 0%,#1B3D2A 100%);border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15);width:100%;}
    .ai-header{padding:1rem 1.2rem;display:flex;align-items:center;gap:10px;}
    .ai-zon{font-size:24px;flex-shrink:0;}
    .ai-header-tekst{flex:1;}
    .ai-titel{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:white;margin-bottom:2px;}
    .ai-sub{font-size:0.75rem;color:rgba(255,255,255,0.55);}
    .ai-privacy{background:rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.08);padding:0.7rem 1.2rem;font-size:0.75rem;color:rgba(255,255,255,0.5);line-height:1.5;}
    .ai-knoppen{padding:0.8rem 1.2rem;display:flex;gap:8px;}
    .ai-ja-btn{flex:2;padding:11px;background:var(--amber);border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;color:white;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .ai-ja-btn:hover{background:var(--amber-diep);}
    .ai-nee-btn{flex:1;padding:11px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;font-size:0.88rem;cursor:pointer;color:rgba(255,255,255,0.7);font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .ai-nee-btn:hover{background:rgba(255,255,255,0.12);}
    .gemeente-wrap{display:flex;gap:8px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;overflow:hidden;padding:0 12px;transition:border-color 0.2s;}
    .gemeente-wrap:focus-within{border-color:var(--amber);}
    .gemeente-input{flex:1;padding:14px 0;font-size:1.1rem;border:none;background:transparent;color:white;outline:none;font-family:'Source Sans 3',sans-serif;font-weight:500;}
    .gemeente-input::placeholder{color:rgba(255,255,255,0.35);font-weight:300;}
    .bel-sol.ai-analyse{background:#0F2318;border:1px solid rgba(232,160,32,0.2);color:rgba(255,255,255,0.85);font-size:0.88rem;line-height:1.65;}
    .bel-sol.ai-analyse a{color:var(--amber);text-decoration:none;}
    .bel-sol.ai-analyse strong{color:white;}
    .ai-laden{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:rgba(255,255,255,0.5);padding:4px 0;}
    .ai-laden-dots span{animation:tikken 1.2s infinite;display:inline-block;width:5px;height:5px;background:var(--amber);border-radius:50%;margin:0 1px;}
    .ai-laden-dots span:nth-child(2){animation-delay:0.2s;}
    .ai-laden-dots span:nth-child(3){animation-delay:0.4s;}

    @media(max-width:480px){.nav-midden{display:none;}.chat-wrap{padding:0 0.6rem;}}
    @media print{nav,.invoer-zone,.res-acties{display:none;}}
  </style>
</head>
<body>

<div id="solidari-nav"></div>
<div class="voortgang-strip"><div class="voortgang-vul" id="voortgang" style="width:0%"></div></div>

<div class="chat-wrap">
  <div class="berichten" id="berichten"></div>
</div>
<div class="invoer-zone" id="invoer-zone"><div class="invoer-inner" id="invoer-inner"></div></div>

<script src="i18n.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
// BACKEND CONFIGURATIE (globaal beschikbaar)
// ══════════════════════════════════════════════════════
const API_BASE    = 'https://api.solidari.nl';
const ANALYSE_URL = API_BASE + '/api/analyse';
const STATUS_URL  = API_BASE + '/api/status';

// ══════════════════════════════════════════════════════
// NIBUD MINIMUMVOORBEELDBEGROTINGEN JULI 2025
// ══════════════════════════════════════════════════════
const NIBUD = {
  alleen:   {huur:636,energie:143,telefoon:64,zorgverzekering:179,overige_verzek:26,begrafenis:10,vervoer:22,voeding:272,kleding:62,reservering:219},
  stel:     {huur:670,energie:163,telefoon:74,zorgverzekering:358,overige_verzek:42,begrafenis:18,vervoer:43,voeding:495,kleding:123,reservering:328},
  eenouder: {huur:676,energie:190,telefoon:64,zorgverzekering:179,overige_verzek:33,begrafenis:10,vervoer:36,voeding:381,kleding:101,reservering:269},
  gezin:    {huur:685,energie:202,telefoon:74,zorgverzekering:358,overige_verzek:47,begrafenis:18,vervoer:57,voeding:534,kleding:162,reservering:377},
};

// ══════════════════════════════════════════════════════
// TEKSTEN (NL volledig — andere talen identiek qua structuur)
// ══════════════════════════════════════════════════════
const T = {
  nl:{
    welkom:'Hallo! Ik help je met jouw budgethulp.\nIk stel je vragen — één voor één. Zo zien we samen hoeveel geld je elke maand overhoudt.',
    start:'Laten we beginnen 👇',
    sit_v:'Wie woont er bij jou thuis?',
    sit_opties:[
      {id:'alleen',   l:'👤 Ik alleen'},
      {id:'stel',     l:'👫 Ik en mijn partner'},
      {id:'eenouder', l:'👩‍👧 Ik en mijn kind(eren)'},
      {id:'gezin',    l:'👨‍👩‍👧‍👦 Wij met kinderen'},
      {id:'thuis',    l:'🏠 Ik woon bij familie of opvang'},
    ],
    thuis_uitleg:'Omdat je geen eigen woonlasten hebt, sla ik huur, energie en verzekeringen over.',
    inkomen_v:'Hoeveel geld ontvang je per maand?',
    inkomen_u:'Dit is je nettoloon of uitkering — het bedrag dat je echt op je rekening krijgt. Dus ná belasting.',

// STATE
// ══════════════════════════════════════════════════════
let taal = 'nl';
const A = {};
const TOTAAL_STAPPEN = 17;
let stap = 0;

function fmt(n){ return '€\u00a0'+Math.round(n).toLocaleString('nl-NL'); }
function pct(a,b){ return b>0 ? Math.round((a/b)*100) : 0; }

function scrollNaar(){
  const b=document.getElementById('berichten');
  setTimeout(()=>b.scrollTo({top:b.scrollHeight,behavior:'smooth'}),50);
}
function verbergInvoer(){ const z=document.getElementById('invoer-inner'); if(z) z.innerHTML=''; }

// ── Bericht tonen met typingindicator
function sol(tekst, type='', ms=0){
  return new Promise(r=>{
    const b=document.getElementById('berichten');
    const t=document.createElement('div');
    t.className='typing';
    t.innerHTML='<div class="sol-avatar">☀️</div><div class="typing-dots"><span></span><span></span><span></span></div>';
    b.appendChild(t); scrollNaar();
    setTimeout(()=>{
      t.remove();
      const w=document.createElement('div');
      w.className='bericht-sol';
      const nl=tekst.replace(/\n/g,'<br>');
      w.innerHTML=`<div class="sol-avatar">☀️</div><div class="bel-sol ${type}">${nl}</div>`;
      b.appendChild(w); scrollNaar(); r();
    }, 550+ms);
  });
}
function user(tekst){
  const b=document.getElementById('berichten');
  const w=document.createElement('div');
  w.className='bericht-user';
  w.innerHTML=`<div class="bel-user">${tekst}</div>`;
  b.appendChild(w); scrollNaar();
}
function setVoortgang(n){ document.getElementById('voortgang').style.width=Math.round((n/TOTAAL_STAPPEN)*100)+'%'; }

// ── Keuze knoppen
function toonKeuze(opties, cb){
  const z=document.getElementById('invoer-inner');
  const r=document.createElement('div'); r.className='keuze-rij';
  opties.forEach(o=>{
    const btn=document.createElement('button'); btn.className='keuze-btn'; btn.textContent=o.l;
    btn.onclick=()=>{ verbergInvoer(); user(o.l); cb(o.id,o.l); };
    r.appendChild(btn);
  });
  z.appendChild(r); scrollNaar();
}

// ── Ja / Nee
function toonJaNee(jaCb, neeCb, optioneel){
  const t=T[taal];
  const z=document.getElementById('invoer-inner');
  const r=document.createElement('div'); r.className='janee-rij';
  const ja=document.createElement('button'); ja.className='ja-btn'; ja.textContent=t.ja;
  ja.onclick=()=>{ verbergInvoer(); user(t.ja); jaCb(); };
  const nee=document.createElement('button'); nee.className='nee-btn'; nee.textContent=t.nee;
  nee.onclick=()=>{ verbergInvoer(); user(t.nee); neeCb(); };
  r.appendChild(ja); r.appendChild(nee); z.appendChild(r);
  if(optioneel){
    const sk=document.createElement('button'); sk.className='overslaan-link'; sk.textContent=t.overslaan;
    sk.onclick=()=>{ verbergInvoer(); neeCb(); }; z.appendChild(sk);
  }
  scrollNaar();
}

// ── Bedrag invoer
function toonBedrag(id, optioneel, cb){
  const t=T[taal];
  const z=document.getElementById('invoer-inner');
  const r=document.createElement('div'); r.className='bedrag-rij';
  const w=document.createElement('div'); w.className='bedrag-wrap';
  w.innerHTML=`<span class="bedrag-euro">€</span><input type="number" id="inp-${id}" class="bedrag-input" min="0" placeholder="0" inputmode="decimal">`;
  const btn=document.createElement('button'); btn.className='stuur-btn'; btn.textContent=t.stuur;
  const go=()=>{
    const v=parseFloat(document.getElementById(`inp-${id}`)?.value)||0;
    verbergInvoer(); user(fmt(v)); cb(v);
  };
  btn.onclick=go;
  w.querySelector('input').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  r.appendChild(w); r.appendChild(btn); z.appendChild(r);
  if(optioneel){
    const sk=document.createElement('button'); sk.className='overslaan-link'; sk.textContent=t.overslaan;
    sk.onclick=()=>{ verbergInvoer(); user('—'); cb(0); }; z.appendChild(sk);
  }
  setTimeout(()=>document.getElementById(`inp-${id}`)?.focus(),60);
  scrollNaar();
}

// ── Naam + bedrag invoer (voor "overige kosten")
function toonNaamBedrag(id, optioneel, cb){
  const t=T[taal];
  const z=document.getElementById('invoer-inner');
  const r=document.createElement('div'); r.className='bedrag-rij';
  const w=document.createElement('div'); w.className='naam-bedrag-wrap';
  w.innerHTML=`<input type="text" id="naam-${id}" class="naam-input" placeholder="${t.naam_placeholder}">
    <div class="naam-sep"></div>
    <span class="naam-euro">€</span>
    <input type="number" id="bedrag-${id}" class="naam-bedrag-input" min="0" placeholder="${t.bedrag_placeholder}" inputmode="decimal">`;
  const btn=document.createElement('button'); btn.className='stuur-btn'; btn.textContent=t.stuur;
  const go=()=>{
    const naam=document.getElementById(`naam-${id}`)?.value.trim()||'Overige kosten';
    const v=parseFloat(document.getElementById(`bedrag-${id}`)?.value)||0;
    verbergInvoer(); user(`${naam}: ${fmt(v)}`); cb(naam,v);
  };
  btn.onclick=go;
  w.querySelector('.naam-bedrag-input').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  r.appendChild(w); r.appendChild(btn); z.appendChild(r);
  if(optioneel){
    const sk=document.createElement('button'); sk.className='overslaan-link'; sk.textContent=t.overslaan;
    sk.onclick=()=>{ verbergInvoer(); user('—'); cb('',0); }; z.appendChild(sk);
  }
  setTimeout(()=>document.getElementById(`naam-${id}`)?.focus(),60);
  scrollNaar();
}

// GESPREKSSTROOM
// ══════════════════════════════════════════════════════
let _bezig = false;
async function start(){
  if (_bezig) return;
  _bezig = true;
  const t=T[taal];
  document.body.style.direction=taal==='ar'?'rtl':'ltr';
  document.getElementById('berichten').innerHTML='';
  verbergInvoer(); stap=0; setVoortgang(0);
  Object.keys(A).forEach(k=>delete A[k]);
  await sol(t.welkom); await sol(t.start);
  _bezig = false;
  await stap_situatie();
}

async function stap_situatie(){
  const t=T[taal]; setVoortgang(++stap);
  await sol(t.sit_v);
  toonKeuze(t.sit_opties, async(id)=>{
    A.sit=id;
    if(id==='thuis'){
      // Woonlasten en inkomen overslaan — defaults op 0
      A.inkomen=0; A.huur=0; A.huurtoeslag=0; A.huurtoeslag_ja=false;
      A.energie=0; A.telefoon=0; A.zorgverzek=0; A.zorgtoeslag=0;
      A.autoverzek=0; A.heeft_auto=false; A.inboedel=0; A.begrafenis=0;
      await sol(t.thuis_uitleg,'reactie');
      await stap_vervoer();
    } else {
      await stap_inkomen();
    }
  });
}

async function stap_inkomen(){
  const t=T[taal]; setVoortgang(++stap);
  await sol(t.inkomen_v); await sol(t.inkomen_u,'reactie');
  toonBedrag('inkomen',false,async(v)=>{ A.inkomen=v; await stap_huur(); });
}

async function stap_huur(){
  const t=T[taal]; setVoortgang(++stap);
  await sol(t.huur_v);
  if(t.huur_u) await sol(t.huur_u,'reactie');
  toonBedrag('huur',false,async(v)=>{
    A.huur=v;
    if(A.inkomen>0){
      const p=pct(v,A.inkomen);
      if(p>40) await sol(t.huur_hoog(p),'waarschuwing');
      else if(p>0) await sol(t.huur_ok(p),'reactie');
    }
    await stap_huurtoeslag();
  });
}

async function stap_huurtoeslag(){
  const t=T[taal]; setVoortgang(++stap);
  await sol(t.huurtsl_v); await sol(t.huurtsl_u,'reactie');
  toonJaNee(
    async()=>{
      A.huurtoeslag_ja=true;
      await sol(t.huurtsl_ja_v); await sol(t.huurtsl_ja_u,'reactie');
      toonBedrag('huurtoeslag',false,async(v)=>{ A.huurtoeslag=v; await sol(t.huurtsl_ja_r,'reactie'); await stap_energie(); });
    },
    async()=>{
      A.huurtoeslag_ja=false; A.huurtoeslag=0;
      if(A.huur>500&&A.inkomen<2500) await sol(t.huurtsl_nee_tip,'toeslag');
      await stap_energie();

}

async function stap_energie(){

async function stap_zorgverzek(){

    async()=>{ A.heeft_auto=false; A.autoverzek=0; await stap_inboedel(); }
  );
}

  toonBedrag('autoverzek',false,async(v)=>{ A.autoverzek=v; await stap_inboedel(); });
}

  const vervoer_uitleg = A.heeft_auto ? t.vervoer_u_auto : t.vervoer_u;
  await sol(vervoer_vraag || t.vervoer_v);
  if(vervoer_uitleg || t.vervoer_u) await sol(vervoer_uitleg || t.vervoer_u,'reactie');
  toonBedrag('vervoer',false,async(v)=>{
    A.vervoer=v;
    if(v===0) await sol(t.vervoer_nul,'reactie');
    await stap_schulden();
  });
}

  toonJaNee(

      await sol(t.schulden_ja_v); await sol(t.schulden_ja_u,'reactie');

function toonAbonnementenInvoer(){
  const t=T[taal];
  const z=document.getElementById('invoer-inner');
  z.innerHTML='';

  // Bestaande items tonen
  const lijstDiv=document.createElement('div');
  lijstDiv.style.cssText='display:flex;flex-direction:column;gap:6px;margin-bottom:8px;';
  (A.abonnementen||[]).forEach((ab,i)=>{
    const item=document.createElement('div');
    item.style.cssText='display:flex;align-items:center;gap:8px;background:var(--groen-licht);border-radius:10px;padding:6px 12px;font-size:0.85rem;';
    item.innerHTML=`<span style="flex:1;color:var(--tekst);">${ab.naam}</span><span style="font-weight:600;color:var(--groen);">${fmt(ab.bedrag)}</span>
      <button onclick="verwijderAbonnem(${i})" style="background:none;border:none;cursor:pointer;color:var(--tekst-licht);font-size:1rem;padding:0 4px;">✕</button>`;
    lijstDiv.appendChild(item);
  });
  if((A.abonnementen||[]).length>0) z.appendChild(lijstDiv);

  // Nieuw invoerveld
  const r=document.createElement('div'); r.className='bedrag-rij';
  const w=document.createElement('div'); w.className='naam-bedrag-wrap';
  w.innerHTML=`<input type="text" id="abn-naam" class="naam-input" placeholder="${t.naam_placeholder}">
    <div class="naam-sep"></div><span class="naam-euro">€</span>
    <input type="number" id="abn-bedrag" class="naam-bedrag-input" min="0" placeholder="0" inputmode="decimal">`;
  const addBtn=document.createElement('button'); addBtn.className='stuur-btn'; addBtn.textContent='+';
  addBtn.onclick=()=>{
    const naam=document.getElementById('abn-naam')?.value.trim();
    const v=parseFloat(document.getElementById('abn-bedrag')?.value)||0;
    if(!naam||v===0) return;
    A.abonnementen.push({naam,bedrag:v});
    toonAbonnementenInvoer();
  };
  w.querySelector('.naam-bedrag-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addBtn.click(); });
  r.appendChild(w); r.appendChild(addBtn); z.appendChild(r);

  // Klaar-knop
  const klaarRij=document.createElement('div'); klaarRij.style.cssText='display:flex;gap:8px;margin-top:6px;';
  const klaarBtn=document.createElement('button');
  klaarBtn.className='stuur-btn'; klaarBtn.style.cssText='flex:1;justify-content:center;padding:12px;font-size:0.9rem;';
  klaarBtn.textContent=t.stuur+' Klaar';
  klaarBtn.onclick=async()=>{
    verbergInvoer();
    const tot=(A.abonnementen||[]).reduce((s,ab)=>s+ab.bedrag,0);
    A.abonnem=tot;
    if(tot>0) user((A.abonnementen||[]).map(ab=>`${ab.naam}: ${fmt(ab.bedrag)}`).join(' · '));
    else user('—');
    if(tot>80) await sol(t.abonnem_hoog,'nibud');
    await stap_boodschappen();
  };
  const skipBtn=document.createElement('button'); skipBtn.className='overslaan-link';
  skipBtn.textContent=t.overslaan;
  skipBtn.onclick=async()=>{ verbergInvoer(); A.abonnem=0; A.abonnementen=[]; user('—'); await stap_boodschappen(); };
  klaarRij.appendChild(klaarBtn); z.appendChild(klaarRij); z.appendChild(skipBtn);
  setTimeout(()=>document.getElementById('abn-naam')?.focus(),60);
  scrollNaar();
}

function verwijderAbonnem(i){
  A.abonnementen.splice(i,1);
  toonAbonnementenInvoer();
}

// ══════════════════════════════════════════════════════
// CONTROLESCHERM — overzicht voor resultaat
// ══════════════════════════════════════════════════════
async function toonControlescherm(){
  const t=T[taal];
  verbergInvoer();

  // Bouw lijst van ingevulde posten
  const posten = [];
  const add = (icon, naam, waarde, stapFn) => {
    if(waarde > 0 || (waarde === 0 && stapFn)) posten.push({icon, naam, waarde, stapFn});
  };

  if(A.sit !== 'thuis'){
    add('🏠', t.lbl_huur||'Huur / hypotheek', A.huur||0, stap_huur);
    if(A.huurtoeslag>0) add('🏠', t.lbl_huurtoeslag||'Huurtoeslag', A.huurtoeslag, stap_huurtoeslag);
    add('⚡', t.lbl_energie||'Energie', A.energie||0, stap_energie);
    add('📱', t.lbl_telefoon||'Telefoon & internet', A.telefoon||0, stap_telefoon);
    add('🏥', t.lbl_zorgverzek||'Zorgverzekering', A.zorgverzek||0, stap_zorgverzek);
    if(A.zorgtoeslag>0) add('🏥', t.lbl_zorgtoeslag||'Zorgtoeslag', A.zorgtoeslag, stap_zorgtoeslag);
    if(A.heeft_auto) add('🚗', t.lbl_autoverzek||'Autoverzekering', A.autoverzek||0, stap_autoverzek);
    if(A.inboedel>0) add('🏠', t.lbl_inboedel||'Inboedel', A.inboedel, stap_inboedel);
    if(A.begrafenis>0) add('⚰️', t.lbl_begrafenis||'Begrafenisverzekering', A.begrafenis, stap_begrafenis);
  }
  add('🚌', t.lbl_vervoer||'Vervoer', A.vervoer||0, stap_vervoer);
  if(A.schulden>0) add('📋', t.lbl_schulden||'Leningen', A.schulden, stap_schulden);
  (A.abonnementen||[]).forEach(ab => posten.push({icon:'📺', naam:ab.naam, waarde:ab.bedrag, stapFn:stap_abonnem}));
  add('🛒', t.lbl_boodschappen||'Boodschappen', A.boodschappen||0, stap_boodschappen);
  if(A.overig>0) add('📦', A.overig_naam||t.lbl_overig||'Overige kosten', A.overig, stap_overig);
  if(A.sparen>0) add('🐷', t.lbl_sparen||'Sparen', A.sparen, stap_sparen);

  const rijsHtml = posten.map(p => `
    <div class="controle-rij">
      <span style="font-size:15px;width:20px;text-align:center;flex-shrink:0;">${p.icon}</span>
      <span class="controle-naam">${p.naam}</span>
      <span class="controle-bedrag">${fmt(p.waarde)}</span>
      <button class="controle-edit" onclick="herstart_vanaf('${p.stapFn.name}')">${t.controle_bewerk}</button>
    </div>`).join('');

  const kaartHtml = `<div class="controle-kaart">
    <div class="controle-header">
      <div class="controle-header-titel">🔍 ${t.controle_titel}</div>
      <div class="controle-header-sub">${t.controle_sub}</div>
    </div>
    <div class="controle-posten">${rijsHtml}</div>
    <div class="controle-acties">
      <button class="controle-ok-btn" onclick="bevestigEnToonResultaat()">${t.controle_ok}</button>
    </div>
  </div>`;

  const b = document.getElementById('berichten');
  const w = document.createElement('div');
  w.className = 'bericht-sol'; w.style.cssText='max-width:100%;width:100%;';
  w.innerHTML = kaartHtml;
  b.appendChild(w); scrollNaar();
}

// Stap opnieuw starten vanuit controle — verwijder controlekaart en ga terug
function herstart_vanaf(stapNaam){
  // Verwijder de controlekaart uit de DOM
  const b = document.getElementById('berichten');
  const laatste = b.lastElementChild;
  if(laatste) laatste.remove();
  // Roep de juiste stapfunctie aan
  const map = {
    stap_huur, stap_huurtoeslag, stap_energie, stap_telefoon,
    stap_zorgverzek, stap_zorgtoeslag, stap_auto, stap_autoverzek,
    stap_inboedel, stap_begrafenis, stap_vervoer, stap_schulden,
    stap_abonnem, stap_boodschappen, stap_overig, stap_sparen,
  };
  const fn = map[stapNaam];
  if(fn) fn();
}

async function bevestigEnToonResultaat(){
  // Verwijder controlekaart
  const b = document.getElementById('berichten');
  const laatste = b.lastElementChild;
  if(laatste) laatste.remove();
  await toonResultaat();
}

// ══════════════════════════════════════════════════════
// BEREKENING
// ══════════════════════════════════════════════════════
function berekenSaldo(){
  const ink=(A.inkomen||0)+(A.huurtoeslag||0)+(A.zorgtoeslag||0);
  const uit=(A.huur||0)+(A.energie||0)+(A.telefoon||0)+(A.zorgverzek||0)+(A.autoverzek||0)+(A.inboedel||0)+(A.begrafenis||0)+(A.vervoer||0)+(A.schulden||0)+(A.abonnem||0)+(A.boodschappen||0)+(A.overig||0)+(A.sparen||0);
  return ink-uit;
}

// ══════════════════════════════════════════════════════
// RESULTAAT
// ══════════════════════════════════════════════════════
async function toonResultaat(){
  const t=T[taal];
  const sit = A.sit||'alleen';
  const ref=NIBUD[sit==='thuis' ? 'alleen' : sit];
  const ink=(A.inkomen||0)+(A.huurtoeslag||0)+(A.zorgtoeslag||0);
  const huurB=A.huur||0, nettoW=Math.max(0,huurB-(A.huurtoeslag||0));
  const energie=A.energie||0, tel=A.telefoon||0, zorgv=A.zorgverzek||0;
  const autov=A.autoverzek||0, inboed=A.inboedel||0, begraf=A.begrafenis||0;
  const verv=A.vervoer||0, schuld=A.schulden||0, abonnem=A.abonnem||0;
  const bood=A.boodschappen||0, overig=A.overig||0, spaar=A.sparen||0;
  const totUit=huurB+energie+tel+zorgv+autov+inboed+begraf+verv+schuld+abonnem+bood+overig+spaar;
  const saldo=ink-totUit, pos=saldo>=-5;
  const wSaldo=saldo/(52/12), dSaldo=saldo/30;

  function badge(v,r){
    if(!r||!v) return '';
    return v>r*1.2 ? `<span class="res-badge hoog">${t.badge_hoog}</span>` : `<span class="res-badge ok">${t.badge_ok}</span>`;
  }
  function rij(icon,naam,v,r,sub){
    if(!v) return '';
    return `<div class="res-post-rij">
      <span class="res-post-icon">${icon}</span>
      <span class="res-post-naam">${naam}${sub?`<span class="res-post-sub">↳ ${t.netto_woon}: ${fmt(sub)}</span>`:''}</span>
      <span class="res-post-bedrag">${fmt(v)}${badge(v,r)}</span>
    </div>`;
  }

  const kaart=`<div class="resultaat-kaart" id="res-kaart">
    <div class="res-header"><div class="res-header-titel">${t.res_titel}</div><div class="res-header-sub">${t.res_sub}</div></div>
    <div class="res-saldo ${pos?'pos':'neg'}">
      <div class="res-saldo-getal">${fmt(saldo)}</div>
      <div class="res-saldo-omschr">${pos?t.overschot:t.tekort} · ${t.inkomen_lbl}: ${fmt(ink)}</div>
    </div>
    <div class="res-pills">
      <div class="res-pill"><div class="res-pill-label">${t.per_week}</div><div class="res-pill-getal">${fmt(wSaldo)}</div></div>
      <div class="res-pill"><div class="res-pill-label">${t.per_dag}</div><div class="res-pill-getal">${fmt(dSaldo)}</div></div>
    </div>
    <div class="res-posten">
      ${rij('🏠', t.lbl_huur||'Huur / hypotheek', huurB, ref.huur, (A.huurtoeslag||0)>0?nettoW:null)}
      ${rij('⚡', t.lbl_energie||'Energie', energie, ref.energie)}
      ${rij('📱', t.lbl_telefoon||'Telefoon & internet', tel, ref.telefoon)}
      ${rij('🏥', t.lbl_zorgverzek||'Zorgverzekering', zorgv, ref.zorgverzekering)}
      ${autov?rij('🚗', t.lbl_autoverzek||'Autoverzekering', autov, 0):''}
      ${inboed?rij('🏠', t.lbl_inboedel||'Inboedel & aansprakelijkheid', inboed, ref.overige_verzek):''}
      ${begraf?rij('⚰️', t.lbl_begrafenis||'Begrafenisverzekering', begraf, ref.begrafenis):''}
      ${rij('🚌', t.lbl_vervoer||'Vervoer', verv, ref.vervoer)}
      ${schuld?rij('📋', t.lbl_schulden||'Leningen / afbetalingen', schuld, 0):''}
      ${(A.abonnementen||[]).map(ab=>rij('📺', ab.naam, ab.bedrag, 0)).join('')}
      ${rij('🛒', t.lbl_boodschappen||'Boodschappen', bood, ref.voeding)}
      ${overig?rij('📦', A.overig_naam||t.lbl_overig||'Overige kosten', overig, 0):''}
      ${spaar?rij('🐷', t.lbl_sparen||'Sparen', spaar, 0):''}
    </div>
    <div class="res-totaal"><span>${t.totaal_uit}</span><span>${fmt(totUit)}</span></div>
    <div style="padding:0.3rem 1.2rem;font-size:0.68rem;color:var(--tekst-licht);font-style:italic;">${t.nibud_bron}</div>
        <div style="padding:0.4rem 1.2rem 0.8rem;">
      <button class="res-opnieuw-btn" onclick="start()">${t.opnieuw_btn}</button>
    </div>
    <div class="res-disclaimer">${t.disclaimer}</div>
  </div>`;

  const b=document.getElementById('berichten');
  const w=document.createElement('div');
  w.className='bericht-sol'; w.style.cssText='max-width:100%;width:100%;';
  w.innerHTML=kaart; b.appendChild(w); scrollNaar();

  // Weekbudget kaart
  const vrijeRuimte=Math.max(0,saldo);
  const wBood  = bood/(52/12);                    // boodschappen maand → week
  const wKled  = ref.kleding/(52/12);             // kleding: Nibud-norm als suggestie
  const wBuf   = ref.reservering/(52/12);         // buffer: Nibud-norm als suggestie
  const wVerv  = verv/(52/12);                    // vervoer maand → week
  const wAbon  = abonnem/(52/12);                 // abonnementen maand → week
  const wDag   = vrijeRuimte/30;
  // Vrije ruimte verdeling voor Excel weekbudget tabblad
  const wVrijeRuimteWeek = vrijeRuimte/(52/12);
  const wVrij  = Math.max(0, wVrijeRuimteWeek - wBood - wKled - wBuf) * 0.6;  // 60% uitjes
  const wOverig = Math.max(0, wVrijeRuimteWeek - wBood - wKled - wBuf) * 0.4; // 40% overig

  // Nibud weekwaarden
  const nibudBood = Math.round(ref.voeding/(52/12));
  const nibudKled = Math.round(ref.kleding/(52/12));
  const nibudBuf  = Math.round(ref.reservering/(52/12));

  function nibudHint(gebruikerWeek, nibudWeek) {
    if (!nibudWeek) return '';
    const isHoog = gebruikerWeek > nibudWeek * 1.2;
    return isHoog
      ? `<div class="week-nibud-hint hoog">${t.week_nibud_hoog(nibudWeek)}</div>`
      : `<div class="week-nibud-hint">${t.week_nibud_ok(nibudWeek)}</div>`;
  }

  function weekRij(icon, naam, wBedrag, nibudWeek) {
    return `<div class="week-cat-rij">
      <span class="week-cat-icon">${icon}</span>
      <div class="week-cat-info">
        <div class="week-cat-naam">${naam}</div>
        ${nibudWeek ? nibudHint(wBedrag, nibudWeek) : ''}
      </div>
      <div class="week-cat-bedrag">
        <div class="week-cat-week">${fmt(wBedrag)}</div>
        <div class="week-cat-dag">${fmt(wBedrag/7)} /dag</div>
      </div>
    </div>`;
  }

  await new Promise(r=>setTimeout(r,300));
  const weekKaart=`<div class="week-kaart">
    <div class="week-header"><div class="week-header-titel">📅 ${t.week_titel}</div><div class="week-header-sub">${t.week_sub}</div></div>
    <div class="week-dag-blok">
      <span class="week-dag-label">${t.week_dag_label}</span>
      <span class="week-dag-bedrag">${fmt(wDag)}</span>
    </div>
    <div class="week-categorieen">
      ${weekRij('🛒', t.week_cat_bood, wBood, nibudBood)}
      ${weekRij('👕', t.week_cat_kled, wKled, nibudKled)}
      ${weekRij('🔧', t.week_cat_buf,  wBuf,  nibudBuf)}
      ${verv>0  ? weekRij('🚌', t.week_cat_verv, wVerv, 0) : ''}
      ${abonnem>0 ? weekRij('📺', t.week_cat_abon, wAbon, 0) : ''}
    </div>
    <div class="week-uitleg">${t.week_uitleg}</div>
  </div>`;

  const ww=document.createElement('div');
  ww.className='bericht-sol'; ww.style.cssText='max-width:100%;width:100%;';
  ww.innerHTML=weekKaart; b.appendChild(ww); scrollNaar();

  // Download knoppen onder weekbudget
  await new Promise(r=>setTimeout(r,200));
  const dlWrap=document.createElement('div');
  dlWrap.className='bericht-sol'; dlWrap.style.cssText='max-width:100%;width:100%;';
  dlWrap.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px;width:100%;">
    <div style="display:flex;gap:8px;">
      <button class="res-excel-btn" id="res-excel" onclick="downloadExcel()" style="flex:1;">📊 ${t.excel_btn}</button>
      <button class="res-pdf-btn" id="res-pdf" onclick="downloadPDF()" style="flex:1;">📄 ${t.pdf_btn}</button>
    </div>
  </div>`;
  b.appendChild(dlWrap); scrollNaar();

  // PDF data opslaan
  window._pdf={saldo,pos,ink,wSaldo,dSaldo,totUit,huurB,nettoW,energie,tel,zorgv,autov,inboed,begraf,verv,schuld,abonnem,abonnementen:A.abonnementen||[],bood,overig,overig_naam:A.overig_naam||'Overige kosten',spaar,sit:A.sit||'alleen',huurtoesl:A.huurtoeslag||0,zorgtoesl:A.zorgtoeslag||0,wBood,wKled,wBuf,wVerv,wAbon,wDag,wVrij,wOverig};

  await new Promise(r=>setTimeout(r,300));
  if(saldo>50)  await sol(t.adv_pos(saldo),'reactie');
  if(saldo<-50) await sol(t.adv_neg(saldo),'waarschuwing');
  if(spaar>0)   await sol(t.adv_spaar(spaar),'reactie');
  await sol(t.adv_toeslag,'toeslag');

  // ── AI uitnodigingskaart — check eerst of PC online is
  await new Promise(r=>setTimeout(r,400));
  await toonAiKaart(t);
}

async function toonAiKaart(t) {
  const b = document.getElementById('berichten');

  // Verwijder eventuele bestaande AI-kaart
  document.querySelectorAll('#ai-uitnodiging').forEach(el => {
    const wrap = el.closest('.bericht-sol');
    if (wrap) wrap.remove();
  });

  // Ping Flask-backend — is de PC aan én zon actief?
  let pcOnline = false;
  try {
    const ping = await Promise.race([
      fetch(STATUS_URL, {method:'GET', cache:'no-cache'}),
      new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 4000))
    ]);
    if (ping.ok) {
      const status = await ping.json();
      pcOnline = status.online === true && status.zon_actief === true;
    }
  } catch(e) { pcOnline = false; }

  const aiKaart = document.createElement('div');
  aiKaart.className = 'bericht-sol';

          <div class="ai-sub">${t.ai_offline_sub}</div>
        </div>
      </div>
      <div style="padding:0 1.2rem 0.6rem;font-size:0.88rem;color:rgba(255,255,255,0.7);line-height:1.6;">
        ${t.ai_offline_tekst}
      </div>
      <div style="padding:0 1.2rem 1rem;">
        <button onclick="toonAiKaart(T[taal])" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 16px;color:rgba(255,255,255,0.7);font-size:0.82rem;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.18)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">

  b.appendChild(aiKaart);

// EXCEL — volledig client-side via SheetJS
// Tabblad 1: Mijn budget | Tabblad 2: Weekbudget
// ══════════════════════════════════════════════════════
function downloadExcel(){
  const t=T[taal], btn=document.getElementById('res-excel');
  if(!btn||!window.XLSX){alert('Excel-bibliotheek nog niet geladen. Probeer opnieuw.'); return;}
  btn.textContent=t.excel_bezig; btn.disabled=true;

  setTimeout(()=>{
    try{
      if(!window._pdf){alert('Vul eerst het budget in.'); btn.disabled=false; btn.textContent='📊 '+T[taal].excel_btn; return;}
      const d=window._pdf;
      const ref=NIBUD[d.sit||'alleen']||NIBUD.alleen;
      const WB=XLSX.utils.book_new();

      // ── Hulpfuncties ──────────────────────────────
      const euro=(n)=>Math.round(n||0);
      const rij=(label,mnd,nibud_mnd)=>{
        const r={[t.kolom_post]:label,[t.kolom_maand]:euro(mnd)};
        if(nibud_mnd) r[t.kolom_nibud]=euro(nibud_mnd);
        return r;
      };

      // ── TABBLAD 1: BUDGET ─────────────────────────
      const budgetData=[];

      // Header inkomsten
      budgetData.push({[t.kolom_post]:t.sectie_inkomsten,[t.kolom_maand]:''});
      budgetData.push(rij(t.inkomen_lbl+' (netto)',d.ink));
      if(d.huurtoesl>0) budgetData.push(rij('↳ '+t.netto_woon+' (huurtoeslag)',d.huurtoesl));
      if(d.zorgtoesl>0) budgetData.push(rij('↳ Zorgtoeslag',d.zorgtoesl));
      budgetData.push({[t.kolom_post]:'',[t.kolom_maand]:''}); // lege rij

      // Header uitgaven
      budgetData.push({[t.kolom_post]:t.sectie_uitgaven,[t.kolom_maand]:''});
      budgetData.push(rij('🏠 Huur / hypotheek (bruto)',d.huurB,ref.huur));
      if(d.huurtoesl>0) budgetData.push(rij('   ↳ '+t.netto_woon,d.nettoW));
      budgetData.push(rij('⚡ Energie',d.energie,ref.energie));
      budgetData.push(rij('📱 Telefoon & internet',d.tel,ref.telefoon));
      budgetData.push(rij('🏥 Zorgverzekering',d.zorgv,ref.zorgverzekering));
      if(d.autov>0) budgetData.push(rij('🚗 Autoverzekering',d.autov));
      if(d.inboed>0) budgetData.push(rij('🏠 Inboedel & aansprakelijkheid',d.inboed,ref.overige_verzek));
      if(d.begraf>0) budgetData.push(rij('⚰️ Begrafenisverzekering',d.begraf,ref.begrafenis));
      budgetData.push(rij('🚌 Vervoer',d.verv,ref.vervoer));
      if(d.schuld>0) budgetData.push(rij('📋 Leningen / afbetalingen',d.schuld));
      (d.abonnementen||[]).forEach(ab=>budgetData.push(rij('📺 '+ab.naam,ab.bedrag)));
      budgetData.push(rij('🛒 Boodschappen',d.bood,ref.voeding));
      if(d.overig>0) budgetData.push(rij('📦 '+d.overig_naam,d.overig));
      if(d.spaar>0) budgetData.push(rij('🐷 '+t.sparen_lbl,d.spaar));
      budgetData.push({[t.kolom_post]:'',[t.kolom_maand]:''}); // lege rij

      // Totaalrij met formule
      const uitgavenStartRij = 4; // rij na header + inkomen + lege rij + sectie-header
      const uitgavenAantalRijen = budgetData.length - 3; // schatting voor formule
      budgetData.push({[t.kolom_post]:t.totaal_uit,[t.kolom_maand]:euro(d.totUit)});
      budgetData.push({[t.kolom_post]:(d.pos?t.overschot:t.tekort),[t.kolom_maand]:euro(d.saldo)});

      const ws1=XLSX.utils.json_to_sheet(budgetData);

      // SUM-formule op totaalveld (kolom B, rij = laatste - 1)
      const totalRow = budgetData.length; // 1-indexed voor Excel
      const sumStart = uitgavenStartRij + 1;
      const sumEnd = totalRow - 1;
      if(ws1['B'+totalRow]) {
        ws1['B'+totalRow] = { t:'n', v:euro(d.totUit), f:`SUM(B${sumStart}:B${sumEnd})` };
      }

      // Kolombreedtes
      ws1['!cols']=[{wch:38},{wch:16},{wch:18}];

      XLSX.utils.book_append_sheet(WB,ws1,t.tab_budget);

      // ── TABBLAD 2: WEEKBUDGET ─────────────────────
      const weekData=[
        {[t.kolom_categorie]:t.week_boodschappen.replace(/^🛒\s*/,''),[t.kolom_week]:euro(d.wBood),[t.kolom_dag]:euro(d.wBood/7)},
        {[t.kolom_categorie]:t.week_vrij.replace(/^🎉\s*/,'').replace(/^🎭\s*/,''),[t.kolom_week]:euro(d.wVrij),[t.kolom_dag]:euro(d.wVrij/7)},
        {[t.kolom_categorie]:t.week_overig.replace(/^🎁\s*/,''),[t.kolom_week]:euro(d.wOverig),[t.kolom_dag]:euro(d.wOverig/7)},
        {[t.kolom_categorie]:'',[t.kolom_week]:'',[t.kolom_dag]:''},
        {[t.kolom_categorie]:t.week_dag_label,[t.kolom_week]:'',[t.kolom_dag]:euro(d.wDag)},
      ];
      const ws2=XLSX.utils.json_to_sheet(weekData);
      ws2['!cols']=[{wch:38},{wch:14},{wch:12}];
      XLSX.utils.book_append_sheet(WB,ws2,t.tab_week);

      const wbout = XLSX.write(WB, {bookType:'xlsx', type:'base64'});
      const a = document.createElement('a');
      a.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + wbout;
      a.download = 'solidari-budgethulp.xlsx';
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 100);
    }catch(e){
      console.error('Excel fout:', e);
      alert('Download geblokkeerd door browserbeveiliging.\nOp solidari.nl (GitHub Pages) werkt dit wel.\nFout: ' + e.message);
    }finally{
      btn.textContent='📊 '+T[taal].excel_btn;
      btn.disabled=false;
    }
  },80);
}

// Verwijder emoji/unicode symbolen die jsPDF niet kan renderen
function pdfTekst(s){ return (s||'').replace(/[^\x00-\xFF]/g,'').replace(/\s+/g,' ').trim(); }

// ══════════════════════════════════════════════════════
// PDF voor begeleider — volledig client-side
// ══════════════════════════════════════════════════════
function downloadPDF(){
  const t=T[taal], btn=document.getElementById('res-pdf');
  if(!btn||!window.jspdf){alert('PDF-bibliotheek niet beschikbaar. Gebruik afdrukken.'); return;}
  btn.textContent=t.pdf_bezig; btn.disabled=true;
  setTimeout(()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const W=210,M=18,CW=W-M*2; let y=20;
      const G=[45,90,61],Am=[196,127,16],Li=[156,156,152],Za=[92,92,88],Te=[26,26,24],Ro=[220,38,38];
      if(!window._pdf){alert('Vul eerst het budget in.'); btn.disabled=false; btn.textContent='📄 '+T[taal].pdf_btn; return;}
      const d=window._pdf, ref=NIBUD[d.sit||'alleen']||NIBUD.alleen;

      // Header
      doc.setFillColor(...G); doc.rect(0,0,W,36,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.text('solidari.nl · Geen opslag van persoonsgegevens',M,11);
      doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.text(t.res_titel,M,24);
      doc.setFontSize(7); doc.setFont('helvetica','normal');
      doc.text(new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'})+'  ·  '+t.res_sub,M,32);
      y=46;

      // Saldo
      doc.setFillColor(...(d.pos?[235,243,238]:[254,242,242]));
      doc.setDrawColor(...(d.pos?G:Ro));
      doc.roundedRect(M,y,CW,20,3,3,'FD');
      doc.setTextColor(...(d.pos?G:Ro));
      doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.text(fmt(d.saldo),W/2,y+9,{align:'center'});
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.text(`${d.pos?t.overschot:t.tekort}  ·  ${t.inkomen_lbl}: ${fmt(d.ink)}`,W/2,y+16,{align:'center'});
      y+=26;

      // Week/dag pills
      const hw=(CW-4)/2;
      doc.setFillColor(253,243,224); doc.rect(M,y,hw,11,'F');
      doc.setTextColor(...Am); doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.text(t.per_week.toUpperCase(),M+3,y+4.5);
      doc.setFontSize(10); doc.text(fmt(d.wSaldo),M+3,y+9.5);
      doc.setFillColor(245,242,236); doc.rect(M+hw+4,y,hw,11,'F');
      doc.setTextColor(...Za); doc.setFontSize(6); doc.text(t.per_dag.toUpperCase(),M+hw+7,y+4.5);
      doc.setFontSize(10); doc.text(fmt(d.dSaldo),M+hw+7,y+9.5);
      y+=17;

      // Uitgaven
      doc.setTextColor(...Te); doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.text(t.totaal_uit.toUpperCase(),M,y+5); y+=8;
      const posten=[
        {n:'Huur / hypotheek',v:d.huurB,r:ref.huur,sub:d.huurtoesl>0?`${t.netto_woon}: ${fmt(d.nettoW)}`:null},
        {n:'Energie',v:d.energie,r:ref.energie},
        {n:'Telefoon & internet',v:d.tel,r:ref.telefoon},
        {n:'Zorgverzekering',v:d.zorgv,r:ref.zorgverzekering},
        ...(d.autov>0?[{n:'Autoverzekering',v:d.autov,r:0}]:[]),
        ...(d.inboed>0?[{n:'Inboedel & aansprakelijkheid',v:d.inboed,r:ref.overige_verzek}]:[]),
        ...(d.begraf>0?[{n:'Begrafenisverzekering',v:d.begraf,r:ref.begrafenis}]:[]),
        {n:'Vervoer',v:d.verv,r:ref.vervoer},
        ...(d.schuld>0?[{n:'Leningen / afbetalingen',v:d.schuld,r:0}]:[]),
        ...(d.abonnementen||[]).map(ab=>({n:ab.naam,v:ab.bedrag,r:0})),
        {n:'Boodschappen',v:d.bood,r:ref.voeding},
        ...(d.overig>0?[{n:d.overig_naam,v:d.overig,r:0}]:[]),
        ...(d.spaar>0?[{n:'Sparen',v:d.spaar,r:0}]:[]),
      ].filter(p=>p.v>0);

      posten.forEach((p,i)=>{
        const h=p.sub?10:8;
        if(i%2===0){doc.setFillColor(248,248,246);doc.rect(M,y,CW,h,'F');}
        doc.setTextColor(...Za); doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.text(p.n,M+3,y+5.5);
        if(p.sub){doc.setTextColor(...G);doc.setFontSize(6);doc.text(p.sub,M+3,y+9);}
        if(p.r>0){const hg=p.v>p.r*1.2; doc.setTextColor(...(hg?Ro:G));doc.setFontSize(6);doc.setFont('helvetica','bold');doc.text(hg?t.badge_hoog:t.badge_ok,W-M-22,y+5.5,{align:'right'});}
        doc.setTextColor(...Te);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(fmt(p.v),W-M-2,y+5.5,{align:'right'});
        y+=h;
      });

      doc.setDrawColor(...Li); doc.line(M,y,W-M,y); y+=4;
      doc.setTextColor(...Te); doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.text(t.totaal_uit,M+3,y+4); doc.text(fmt(d.totUit),W-M-2,y+4,{align:'right'}); y+=12;

      // Weekbudget sectie
      doc.setFillColor(196,127,16); doc.rect(M,y,CW,10,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text(t.week_titel,M+4,y+6.5); y+=14;
      const wcats=[
        {naam:t.week_boodschappen.replace(/^🛒\s*/,''),week:d.wBood},
        {naam:t.week_vrij.replace(/^[🎉🎭]\s*/u,''),week:d.wVrij},
        {naam:t.week_overig.replace(/^🎁\s*/,''),week:d.wOverig},
      ];
      wcats.forEach((c,i)=>{
        if(i%2===0){doc.setFillColor(253,243,224);doc.rect(M,y,CW,8,'F');}
        doc.setTextColor(...Za); doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.text(pdfTekst(c.naam||c.icon||''),M+3,y+5.5);
        doc.setTextColor(...Am); doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.text(fmt(c.week),W-M-2,y+5.5,{align:'right'});
        y+=8;
      });
      y+=4;
      doc.setTextColor(...Li); doc.setFontSize(6.5); doc.setFont('helvetica','italic'); doc.text(t.nibud_bron,W/2,y,{align:'center'}); y+=8;
      doc.setTextColor(...Li); doc.setFontSize(6); doc.text('solidari.nl  ·  '+t.disclaimer.replace(/<[^>]*>/g,''),W/2,285,{align:'center',maxWidth:CW});

      const pdfData = doc.output('datauristring');
      const ap = document.createElement('a');
      ap.href = pdfData;
      ap.download = 'solidari-budgethulp-begeleider.pdf';
      ap.style.display = 'none';
      document.body.appendChild(ap);
      ap.click();
      setTimeout(() => document.body.removeChild(ap), 100);
    }catch(e){console.error('PDF fout:', e);alert('Download geblokkeerd door browserbeveiliging.\nOp solidari.nl (GitHub Pages) werkt dit wel.\nFout: ' + e.message);}
    finally{btn.textContent='📄 '+T[taal].pdf_btn;btn.disabled=false;}
  },80);
}

function toonGemeenteInvoer() {
  const t = T[taal];
  const z = document.getElementById('invoer-inner');
  z.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:#0F2318;border-radius:14px;padding:0.8rem;';
  wrap.innerHTML = `<div class="gemeente-wrap">
    <input type="text" id="gemeente-inp" class="gemeente-input" placeholder="${t.ai_gemeente_placeholder}" autocomplete="off">
    <button class="stuur-btn" onclick="verwerkGemeente()" style="background:var(--amber);">→</button>
  </div>`;
  z.appendChild(wrap);
  const inp = document.getElementById('gemeente-inp');
  if (inp) {
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') verwerkGemeente(); });
  }
  scrollNaar();
}

async function verwerkGemeente() {
  const inp = document.getElementById('gemeente-inp');
  const gemeente = inp ? inp.value.trim() : '';
  if (!gemeente) return;
  aiGemeente = gemeente;
  verbergInvoer();
  user(gemeente);
  await roepAiAan(gemeente);
}

function bouwBudgetContext(gemeente) {
  const d = window._pdf;
  if (!d) return '';
  const ref = NIBUD[d.sit || 'alleen'];
  const sit_labels = { alleen: 'alleenstaand', stel: 'samenwonend stel', eenouder: 'eenoudergezin', gezin: 'gezin met kinderen' };
  const woonquote = d.ink > 0 ? Math.round((d.huurB / d.ink) * 100) : 0;
  const nettoWoon = d.huurtoesl > 0 ? d.nettoW : d.huurB;

  const knelpunten = [];
  if (woonquote > 40) knelpunten.push(`Woonquote hoog: ${woonquote}% (advies max 40%)`);
  if (!d.huurtoesl || d.huurtoesl === 0) knelpunten.push('Geen huurtoeslag (mogelijk gemist)');
  if (!d.zorgtoesl || d.zorgtoesl === 0) knelpunten.push('Geen zorgtoeslag (mogelijk gemist)');
  if (d.schuld > 0) knelpunten.push(`Leningen/afbetalingen: €${Math.round(d.schuld)}/mnd`);
  if (d.saldo < -50) knelpunten.push(`Maandelijks tekort: €${Math.round(Math.abs(d.saldo))}`);
  if (d.bood < ref.voeding * 0.65 && d.bood > 0) knelpunten.push('Boodschappenbudget mogelijk onderschat');

  const abonnementenTxt = (d.abonnementen || []).map(ab => `${ab.naam}: €${Math.round(ab.bedrag)}`).join(', ');

  return `BUDGETOVERZICHT VOOR AI-ANALYSE
Situatie: ${sit_labels[d.sit] || d.sit}
Gemeente: ${gemeente}

INKOMSTEN (per maand):
- Totaal inkomen: €${Math.round(d.ink)}
- Netto loon/uitkering: €${Math.round(d.ink - (d.huurtoesl || 0) - (d.zorgtoesl || 0))}
${d.huurtoesl > 0 ? `- Huurtoeslag: €${Math.round(d.huurtoesl)}` : '- Geen huurtoeslag ontvangen'}
${d.zorgtoesl > 0 ? `- Zorgtoeslag: €${Math.round(d.zorgtoesl)}` : '- Geen zorgtoeslag ontvangen'}

UITGAVEN (per maand):
- Huur/hypotheek (bruto): €${Math.round(d.huurB)} | netto woonlast: €${Math.round(nettoWoon)} | woonquote: ${woonquote}%
- Energie: €${Math.round(d.energie)}
- Telefoon & internet: €${Math.round(d.tel)}
- Zorgverzekering: €${Math.round(d.zorgv)}
${d.autov > 0 ? `- Autoverzekering: €${Math.round(d.autov)}` : ''}
${d.inboed > 0 ? `- Inboedel & aansprakelijkheid: €${Math.round(d.inboed)}` : ''}
${d.begraf > 0 ? `- Begrafenisverzekering: €${Math.round(d.begraf)}` : ''}
- Vervoer: €${Math.round(d.verv)}
${d.schuld > 0 ? `- Leningen/afbetalingen: €${Math.round(d.schuld)}` : ''}
${abonnementenTxt ? `- Abonnementen: ${abonnementenTxt}` : ''}
- Boodschappen: €${Math.round(d.bood)}
${d.overig > 0 ? `- ${d.overig_naam}: €${Math.round(d.overig)}` : ''}
${d.spaar > 0 ? `- Sparen: €${Math.round(d.spaar)}` : ''}
- TOTAAL UITGAVEN: €${Math.round(d.totUit)}

SALDO: €${Math.round(d.saldo)} per maand (${d.pos ? 'overschot' : 'TEKORT'})

GESIGNALEERDE KNELPUNTEN:
${knelpunten.length > 0 ? knelpunten.map(k => `- ${k}`).join('\n') : '- Geen directe knelpunten'}

Nibud-referentie voor deze situatie:
- Huur richtlijn: €${ref.huur} | Voeding richtlijn: €${ref.voeding} | Energie richtlijn: €${ref.energie}`;
}

async function roepAiAan(gemeente) {
  const t = T[taal];
  const taalNamen = { nl: 'Nederlands', en: 'English', ar: 'Arabic', tr: 'Turkish', uk: 'Ukrainian', ti: 'Tigrinya', fa: 'Dari (Farsi)' };
  const antwoordTaal = taalNamen[taal] || 'Nederlands';
  const budgetContext = bouwBudgetContext(gemeente);

  const b = document.getElementById('berichten');
  const laadDiv = document.createElement('div');
  laadDiv.className = 'bericht-sol';
  laadDiv.innerHTML = `<div class="sol-avatar">☀️</div><div class="bel-sol ai-analyse">
    <div class="ai-laden">${t.ai_laden} <div class="ai-laden-dots"><span></span><span></span><span></span></div></div>
  </div>`;
  b.appendChild(laadDiv);
  scrollNaar();

  // Gerichte prompt — max 3 web searches om timeout te vermijden
  // Knelpunten bepalen welke searches het meest relevant zijn
  const d = window._pdf || {};
  const knelpunten = [];
  if (d.saldo < -50 || d.schuld > 0) knelpunten.push('schuldhulpverlening');
  if (!d.huurtoesl || d.huurtoesl === 0) knelpunten.push('bijzondere bijstand');
  if (d.bood < 150) knelpunten.push('voedselbank');

  const zoekFocus = knelpunten.length > 0
    ? knelpunten.join(', ')
    : 'bijzondere bijstand, voedselbank, minimaregelingen';

  const systeemprompt = `Je bent een vriendelijke budgetcoach voor Solidari.
TAAL: Antwoord UITSLUITEND in het ${antwoordTaal}. Geen uitzonderingen.

Geef advies in 3 delen:

1. BUDGETANALYSE (max 3 zinnen): Bespreek de financiele situatie eerlijk maar respectvol. Benoem het belangrijkste knelpunt.

2. HULP IN ${gemeente.toUpperCase()}: Geef voor elke relevante categorie specifieke informatie voor gemeente ${gemeente}:
- Bijzondere bijstand: hoe aanvragen
- Collectieve zorgverzekering gemeente ${gemeente}
- Kwijtschelding gemeentebelastingen: hoe aanvragen
- Voedselbank: locatie als je die kent
- Schuldhulpverlening gemeente ${gemeente}: contactgegevens
- Sociaal Wijkteam of VluchtelingenWerk in ${gemeente}
- Stichting Leergeld ${gemeente}: voor kinderen
- Kledingbank in de regio
Als je iets niet zeker weet, zeg dat eerlijk en verwijs naar de gemeente-website of het Sociaal Wijkteam.

3. TOP 3 ACTIES: Drie concrete stappen die nu gezet kunnen worden.

Sluit af met: Neem de Excel of PDF mee naar je begeleider.
Maximaal 400 woorden.`

  // Timeout via Promise.race (AbortController werkt niet in sandboxed iframe)
  // API_BASE, ANALYSE_URL en STATUS_URL zijn globaal gedefinieerd bovenaan het script

  const fetchPromise = fetch(ANALYSE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systeem: systeemprompt,
        bericht: budgetContext
      })
    });
  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('TIMEOUT')), 45000)
  );

  try {
    const response = await Promise.race([fetchPromise, timeoutPromise]);
    const data = await response.json();
    laadDiv.remove();

    if (data.error) {
      const msg = data.error.type === 'overloaded_error'
        ? 'De AI-dienst is even druk. Probeer het over een minuut opnieuw.'
        : 'Fout bij AI-analyse: ' + (data.error.message || 'onbekend');
      await sol(msg, 'waarschuwing');
      return;
    }

    // Proxy geeft { tekst: "..." } terug, of Anthropic-formaat als directe call
    const tekst = data.tekst ||
      (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();

    if (!tekst) {
      await sol('De analyse gaf geen resultaat. Probeer het opnieuw.', 'waarschuwing');
      return;
    }

    // Toon alinea voor alinea
    const alineas = tekst.split(/\n\n+/).filter(a => a.trim());
    for (const alinea of alineas) {
      const wrap = document.createElement('div');
      wrap.className = 'bericht-sol';
      const html = alinea
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/(https?:\/\/[^\s\]<]+)/g, '<a href="$1" target="_blank" rel="noopener">🔗 $1</a>')
        .replace(/\n/g, '<br>');
      wrap.innerHTML = `<div class="sol-avatar">☀️</div><div class="bel-sol ai-analyse">${html}</div>`;
      b.appendChild(wrap);
      await new Promise(r => setTimeout(r, 100));
    }
    scrollNaar();

    window._pdf.gemeente = gemeente;
    window._pdf.ai_tekst = tekst;

    // Excel knop met data-attribuut (geen string-escape issues)
    const updateWrap = document.createElement('div');
    updateWrap.className = 'bericht-sol';
    updateWrap.style.cssText = 'max-width:100%;width:100%;';
    const excelBtn = document.createElement('button');
    excelBtn.className = 'ai-ja-btn';
    excelBtn.style.cssText = 'width:100%;margin-top:4px;';
    excelBtn.textContent = '📊 Excel downloaden met hulp in ' + gemeente;
    excelBtn.addEventListener('click', () => downloadExcelMetGemeente(gemeente));
    const inner = document.createElement('div');
    inner.style.cssText = 'background:#0F2318;border-radius:14px;padding:0.8rem 1.2rem;';
    inner.innerHTML = `<p style="font-size:0.82rem;color:rgba(255,255,255,0.65);margin-bottom:8px;">📊 Hulp in ${gemeente} is toegevoegd als tabblad aan je Excel.</p>`;
    inner.appendChild(excelBtn);
    updateWrap.appendChild(inner);
    b.appendChild(updateWrap);
    scrollNaar();

  } catch (err) {
    if (laadDiv.parentNode) laadDiv.remove();
    console.error('AI fout:', err);
    if (err.message === 'TIMEOUT') {
      await sol('De analyse duurde te lang (45 sec). Probeer opnieuw.', 'waarschuwing');
    } else {
      const msg = 'Verbinding met AI-analyse mislukt. Controleer of de API-server actief is (' + API_BASE + ').';
      await sol(msg, 'waarschuwing');
    }
  }
}

function downloadExcelMetGemeente(gemeente) {
  const d = window._pdf;
  if (!d || !d.ai_tekst) { downloadExcel(); return; }
  const t = T[taal];
  if (!window.XLSX) { alert('Excel niet beschikbaar.'); return; }

  // Zelfde als downloadExcel maar met extra tabblad
  const btn = event.target;
  btn.textContent = t.excel_bezig; btn.disabled = true;

  setTimeout(() => {
    try {
      const ref = NIBUD[d.sit || 'alleen'];
      const WB = XLSX.utils.book_new();
      const euro = n => Math.round(n || 0);
      const rij = (label, mnd, nibud_mnd) => {
        const r = { [t.kolom_post]: label, [t.kolom_maand]: euro(mnd) };
        if (nibud_mnd) r[t.kolom_nibud] = euro(nibud_mnd);
        return r;
      };

      // Tabblad 1: Budget (zelfde opbouw als downloadExcel)
      const budgetData = [];
      budgetData.push({ [t.kolom_post]: t.sectie_inkomsten, [t.kolom_maand]: '' });
      budgetData.push(rij(t.inkomen_lbl + ' (netto)', d.ink));
      if (d.huurtoesl > 0) budgetData.push(rij('  Huurtoeslag', d.huurtoesl));
      if (d.zorgtoesl > 0) budgetData.push(rij('  Zorgtoeslag', d.zorgtoesl));
      budgetData.push({ [t.kolom_post]: '', [t.kolom_maand]: '' });
      budgetData.push({ [t.kolom_post]: t.sectie_uitgaven, [t.kolom_maand]: '' });
      budgetData.push(rij('Huur / hypotheek (bruto)', d.huurB, ref.huur));
      if (d.huurtoesl > 0) budgetData.push(rij('  ' + t.netto_woon, d.nettoW));
      budgetData.push(rij('Energie', d.energie, ref.energie));
      budgetData.push(rij('Telefoon & internet', d.tel, ref.telefoon));
      budgetData.push(rij('Zorgverzekering', d.zorgv, ref.zorgverzekering));
      if (d.autov > 0) budgetData.push(rij('Autoverzekering', d.autov));
      if (d.inboed > 0) budgetData.push(rij('Inboedel & aansprakelijkheid', d.inboed, ref.overige_verzek));
      if (d.begraf > 0) budgetData.push(rij('Begrafenisverzekering', d.begraf, ref.begrafenis));
      budgetData.push(rij('Vervoer', d.verv, ref.vervoer));
      if (d.schuld > 0) budgetData.push(rij('Leningen / afbetalingen', d.schuld));
      (d.abonnementen || []).forEach(ab => budgetData.push(rij(ab.naam, ab.bedrag)));
      budgetData.push(rij('Boodschappen', d.bood, ref.voeding));
      if (d.overig > 0) budgetData.push(rij(d.overig_naam, d.overig));
      if (d.spaar > 0) budgetData.push(rij(t.sparen_lbl, d.spaar));
      budgetData.push({ [t.kolom_post]: '', [t.kolom_maand]: '' });
      budgetData.push({ [t.kolom_post]: t.totaal_uit, [t.kolom_maand]: euro(d.totUit) });
      budgetData.push({ [t.kolom_post]: d.pos ? t.overschot : t.tekort, [t.kolom_maand]: euro(d.saldo) });
      const ws1 = XLSX.utils.json_to_sheet(budgetData);
      ws1['!cols'] = [{ wch: 38 }, { wch: 16 }, { wch: 18 }];
      XLSX.utils.book_append_sheet(WB, ws1, t.tab_budget);

      // Tabblad 2: Weekbudget
      const weekData = [
        { [t.kolom_categorie]: t.week_boodschappen.replace(/^🛒\s*/, ''), [t.kolom_week]: euro(d.wBood), [t.kolom_dag]: euro(d.wBood / 7) },
        { [t.kolom_categorie]: t.week_vrij.replace(/^🎉\s*|^🎭\s*/, ''), [t.kolom_week]: euro(d.wVrij), [t.kolom_dag]: euro(d.wVrij / 7) },
        { [t.kolom_categorie]: t.week_overig.replace(/^🎁\s*/, ''), [t.kolom_week]: euro(d.wOverig), [t.kolom_dag]: euro(d.wOverig / 7) },
        { [t.kolom_categorie]: '', [t.kolom_week]: '', [t.kolom_dag]: '' },
        { [t.kolom_categorie]: t.week_dag_label, [t.kolom_week]: '', [t.kolom_dag]: euro(d.wDag) },
      ];
      const ws2 = XLSX.utils.json_to_sheet(weekData);
      ws2['!cols'] = [{ wch: 38 }, { wch: 14 }, { wch: 12 }];
      XLSX.utils.book_append_sheet(WB, ws2, t.tab_week);

      // Tabblad 3: Hulp in gemeente — parse AI tekst in regels
      const hulpData = [];
      const regels = (d.ai_tekst || '').split('\n').filter(r => r.trim());
      regels.forEach(r => {
        const schoon = r.replace(/\*\*/g, '').replace(/\[bron:.*?\]/g, '').trim();
        if (schoon.length > 5) hulpData.push({ [t.ai_kolom_regeling]: schoon, [t.ai_kolom_contact]: '' });
      });
      if (hulpData.length > 0) {
        const ws3 = XLSX.utils.json_to_sheet(hulpData);
        ws3['!cols'] = [{ wch: 55 }, { wch: 30 }];
        const tabNaam = (t.ai_tab_hulp + ' ' + gemeente).substring(0, 31);
        XLSX.utils.book_append_sheet(WB, ws3, tabNaam);
      }

      const wbout2 = XLSX.write(WB, {bookType:'xlsx', type:'base64'});
      const a2 = document.createElement('a');
      a2.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + wbout2;
      a2.download = 'solidari-budgethulp-' + gemeente.toLowerCase().replace(/\s+/g, '-') + '.xlsx';
      a2.style.display = 'none';
      document.body.appendChild(a2);
      a2.click();
      setTimeout(() => document.body.removeChild(a2), 100);
    } catch (e) {
      console.error(e);
      alert('Excel maken mislukt.');
    } finally {
      btn.textContent = '📊 ' + T[taal].excel_btn;
      btn.disabled = false;
    }
  }, 80);
}

function setTaal(code,btn){
  taal=code;
  document.querySelectorAll('.taal-btn').forEach(b=>b.classList.remove('actief'));
  if(btn) btn.classList.add('actief');
  // Centrale i18n voor nav-links en gedeelde strings
  if(window.Solidari && Solidari.i18n) Solidari.i18n.passToe(code);
  // Tool-specifieke strings via eigen T{} — alleen herstarten als al gestart
  if(_gestart) start();
}

// Init centrale i18n en start bij laden
let _gestart = false;
function _init() {
  if (_gestart) return;
  _gestart = true;
  if(window.Solidari && Solidari.i18n) Solidari.i18n.init();
  start();
}
document.addEventListener('DOMContentLoaded', _init);
_init();
