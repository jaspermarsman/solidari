<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>18 Jaar Worden — Solidari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    :root {
      --wit: #FAFAF7; --wit-warm: #F5F2EC;
      --amber: #E8A020; --amber-licht: #FDF3E0; --amber-diep: #C47F10;
      --groen: #2D5A3D; --groen-licht: #EBF3EE;
      --tekst: #1A1A18; --tekst-zacht: #5C5C58; --tekst-licht: #9C9C98;
      --rand: #E8E5DE; --rood-licht: #FEF2F2; --rood: #DC2626;
      --blauw-licht: #EFF6FF; --blauw: #2563EB;
      --paars-licht: #F5F3FF; --paars: #7C3AED;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--wit); color: var(--tekst); font-family: 'Source Sans 3', sans-serif; font-weight: 400; line-height: 1.6; }

    /* ── Nav (via components.js) ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,247,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--rand);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:36px;height:36px;}
    .logo-naam{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--tekst);letter-spacing:-0.02em;}
    .logo-naam span{color:var(--amber);}
    .nav-links{display:flex;align-items:center;gap:2rem;list-style:none;}
    .nav-links a{text-decoration:none;color:var(--tekst-zacht);font-size:0.9rem;font-weight:500;transition:color 0.2s;}
    .nav-links a:hover{color:var(--tekst);}
    .nav-taal{display:flex;gap:0.4rem;}
    .taal-btn{background:none;border:1px solid var(--rand);border-radius:4px;padding:3px 8px;font-size:0.75rem;cursor:pointer;color:var(--tekst-zacht);font-family:'Source Sans 3',sans-serif;transition:all 0.2s;}
    .taal-btn:hover,.taal-btn.actief{background:var(--amber);border-color:var(--amber);color:white;}

    /* HEADER */
    .pagina-header { padding-top: 64px; background: var(--groen); color: white; position: relative; overflow: hidden; }
    .pagina-header::before { content: '🎂'; position: absolute; right: 8%; top: 50%; transform: translateY(-50%); font-size: 7rem; opacity: 0.07; pointer-events: none; }
    .pagina-header::after { content: ''; position: absolute; right: -80px; top: -80px; width: 320px; height: 320px; border-radius: 50%; background: rgba(232,160,32,0.08); }
    .header-inhoud { max-width: 780px; margin: 0 auto; padding: 3rem 2rem 2.5rem; position: relative; z-index: 1; }
    .header-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; opacity: 0.85; }
    .header-titel { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.6rem; }
    .header-sub { font-size: 1rem; opacity: 0.75; font-weight: 300; max-width: 520px; line-height: 1.7; }

    /* LEEFTIJD INPUT */
    .leeftijd-balk { background: rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.1); padding: 1.2rem 2rem; }
    .leeftijd-inhoud { max-width: 780px; margin: 0 auto; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .leeftijd-label { font-size: 0.85rem; opacity: 0.8; font-weight: 500; white-space: nowrap; }
    .leeftijd-knoppen { display: flex; gap: 8px; flex-wrap: wrap; }
    .leeftijd-knop { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; color: white; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: all 0.2s; }
    .leeftijd-knop:hover { background: rgba(255,255,255,0.2); }
    .leeftijd-knop.actief { background: var(--amber); border-color: var(--amber); }

    /* HOOFD */
    .hoofd { max-width: 780px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

    /* FASE TABS */
    .fase-tabs { display: flex; gap: 4px; background: var(--wit-warm); border: 1px solid var(--rand); border-radius: 12px; padding: 4px; margin-bottom: 2rem; }
    .fase-tab { flex: 1; padding: 9px 12px; border-radius: 9px; border: none; background: none; font-family: 'Source Sans 3', sans-serif; font-size: 0.82rem; font-weight: 600; color: var(--tekst-licht); cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.3; }
    .fase-tab:hover { color: var(--tekst-zacht); }
    .fase-tab.actief { background: white; color: var(--tekst); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .fase-tab.actief.voor { color: var(--amber-diep); }
    .fase-tab.actief.op { color: var(--groen); }
    .fase-tab.actief.na { color: var(--blauw); }

    /* CATEGORIE KAARTEN */
    .categorie-kaart { border: 1px solid var(--rand); border-radius: 16px; overflow: hidden; margin-bottom: 1rem; animation: inschuiven 0.35s ease both; }
    @keyframes inschuiven { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .categorie-header { padding: 1.1rem 1.4rem; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; transition: background 0.2s; }
    .categorie-header:hover { background: var(--wit-warm); }
    .categorie-icoon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .categorie-info { flex: 1; }
    .categorie-naam { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--tekst); }
    .categorie-samenvatting { font-size: 0.78rem; color: var(--tekst-licht); margin-top: 1px; font-weight: 300; }
    .categorie-pijl { color: var(--tekst-licht); font-size: 0.8rem; transition: transform 0.2s; }
    .categorie-kaart.open .categorie-pijl { transform: rotate(180deg); }
    .categorie-badge { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.03em; flex-shrink: 0; }

    .categorie-body { display: none; padding: 0 1.4rem 1.4rem; border-top: 1px solid var(--rand); }
    .categorie-kaart.open .categorie-body { display: block; }

    .punt-lijst { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
    .punt { display: flex; gap: 10px; align-items: flex-start; }
    .punt-icoon { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; margin-top: 1px; }
    .punt-tekst { font-size: 0.85rem; color: var(--tekst-zacht); line-height: 1.55; font-weight: 300; }
    .punt-tekst strong { color: var(--tekst); font-weight: 600; }

    .info-box { background: var(--blauw-licht); border-left: 3px solid var(--blauw); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 1rem; font-size: 0.82rem; color: var(--tekst-zacht); line-height: 1.5; }
    .amber-box { background: var(--amber-licht); border-left: 3px solid var(--amber); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 1rem; font-size: 0.82rem; color: var(--tekst-zacht); line-height: 1.5; }
    .groen-box { background: var(--groen-licht); border-left: 3px solid var(--groen); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 1rem; font-size: 0.82rem; color: var(--tekst-zacht); line-height: 1.5; }

    .bedrag-chip { display: inline-block; background: var(--groen); color: white; font-size: 0.75rem; font-weight: 700; padding: 1px 8px; border-radius: 4px; margin-left: 4px; }
    .stopt-chip { display: inline-block; background: var(--rood-licht); color: var(--rood); font-size: 0.75rem; font-weight: 700; padding: 1px 8px; border-radius: 4px; margin-left: 4px; }
    .nieuw-chip { display: inline-block; background: var(--groen-licht); color: var(--groen); font-size: 0.75rem; font-weight: 700; padding: 1px 8px; border-radius: 4px; margin-left: 4px; }
    .let-chip { display: inline-block; background: var(--amber-licht); color: var(--amber-diep); font-size: 0.75rem; font-weight: 700; padding: 1px 8px; border-radius: 4px; margin-left: 4px; }

    .externe-link { display: inline-flex; align-items: center; gap: 5px; color: var(--blauw); text-decoration: none; font-size: 0.82rem; font-weight: 500; margin-top: 0.8rem; transition: opacity 0.2s; }
    .externe-link:hover { opacity: 0.7; }

    /* FASE INTRO */
    .fase-intro { background: white; border: 1px solid var(--rand); border-radius: 14px; padding: 1.2rem 1.4rem; margin-bottom: 1.5rem; display: flex; gap: 14px; align-items: flex-start; }
    .fase-intro-icoon { font-size: 1.6rem; flex-shrink: 0; }
    .fase-intro-tekst { font-size: 0.88rem; color: var(--tekst-zacht); line-height: 1.65; font-weight: 300; }
    .fase-intro-tekst strong { color: var(--tekst); }

    /* CHECKLIST */
    .checklist-wrap { background: var(--wit-warm); border: 1px solid var(--rand); border-radius: 14px; padding: 1.4rem; margin-top: 2rem; }
    .checklist-titel { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--tekst); }
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .checklist-item { display: flex; gap: 10px; align-items: flex-start; }
    .check-box { width: 18px; height: 18px; border: 2px solid var(--rand); border-radius: 5px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-box:hover { border-color: var(--groen); }
    .check-box.gedaan { background: var(--groen); border-color: var(--groen); color: white; font-size: 0.65rem; }
    .checklist-item.gedaan .checklist-tekst { text-decoration: line-through; color: var(--tekst-licht); }
    .checklist-tekst { font-size: 0.85rem; color: var(--tekst-zacht); line-height: 1.5; cursor: pointer; }
    .checklist-sub { font-size: 0.75rem; color: var(--tekst-licht); font-weight: 300; }


    /* DISCLAIMER */
    .disclaimer { margin-top: 2rem; padding: 1rem 1.2rem; background: var(--wit-warm); border-radius: 10px; font-size: 0.75rem; color: var(--tekst-licht); line-height: 1.6; }

    @media (max-width: 600px) {
      .header-titel { font-size: 1.7rem; }
      .fase-tab { font-size: 0.75rem; padding: 8px 8px; }
      .leeftijd-inhoud { gap: 0.8rem; }
    }
  </style>
</head>
<body>

<div id="solidari-nav"></div>

<div class="pagina-header">
  <div class="header-inhoud">
    <div class="header-badge">🎂 <span data-i18n="18-badge">18 Jaar Worden</span></div>
    <h1 class="header-titel" data-i18n="18-titel">Wat verandert er als mijn kind 18 wordt?</h1>
    <p class="header-sub" data-i18n="18-sub">Als je kind 18 jaar wordt, verandert er veel: toeslagen stoppen, nieuwe rechten beginnen, en er zijn dingen die je vóór die datum moet regelen.</p>
  </div>
  <div class="leeftijd-balk">
    <div class="leeftijd-inhoud">
      <span class="leeftijd-label" data-i18n="18-perspectief-label">Bekijk informatie voor:</span>
      <div class="leeftijd-knoppen">
        <button class="leeftijd-knop actief" onclick="setDoelgroep(this, 'ouder')" data-i18n="18-knop-ouder">👨‍👩‍👧 Ik ben de ouder</button>
        <button class="leeftijd-knop" onclick="setDoelgroep(this, 'kind')" data-i18n="18-knop-kind">🧑 Ik word 18</button>
      </div>
    </div>
  </div>
</div>

<div class="hoofd">

  <div class="fase-tabs">
    <button class="fase-tab voor actief" onclick="setFase('voor')" data-i18n="18-tab-voor">⏰ Vóór de 18e verjaardag</button>
    <button class="fase-tab op" onclick="setFase('op')" data-i18n="18-tab-op">🎂 Op de 18e verjaardag</button>
    <button class="fase-tab na" onclick="setFase('na')" data-i18n="18-tab-na">→ Ná de 18e verjaardag</button>
  </div>

  <div id="inhoud"></div>

</div>

<script src="18jaar-data-1.js"></script>
<script src="18jaar-data-2.js"></script>
<script src="18jaar-data-3.js"></script>
<script src="i18n.js"></script>
<script src="components.js"></script>

function getData() {
  var taal = huidigeTaal;
  var d18 = window._D18;
  if (d18 && d18[taal] && d18[taal][huidigeDoelgroep] && d18[taal][huidigeDoelgroep][huidigeFase]) {
    return d18[taal][huidigeDoelgroep][huidigeFase];
  }
  if (d18 && d18['NL'] && d18['NL'][huidigeDoelgroep] && d18['NL'][huidigeDoelgroep][huidigeFase]) {
    return d18['NL'][huidigeDoelgroep][huidigeFase];
  }
  return _legeData[huidigeDoelgroep] && _legeData[huidigeDoelgroep][huidigeFase];
}

function setDoelgroep(el, dg) {
  document.querySelectorAll('.leeftijd-knop').forEach(b => b.classList.remove('actief'));
  el.classList.add('actief');
  huidigeDoelgroep = dg;
  render();
}

function setFase(fase) {
  huidigeFase = fase;
  document.querySelectorAll('.fase-tab').forEach(t => t.classList.remove('actief'));
  document.querySelector(`.fase-tab.${fase}`).classList.add('actief');
  render();
}

function toggleCategorie(el) {
  el.closest('.categorie-kaart').classList.toggle('open');
}

function toggleCheck(el) {
  const item = el.closest('.checklist-item');
  item.classList.toggle('gedaan');
  el.classList.toggle('gedaan');
  el.textContent = el.classList.contains('gedaan') ? '✓' : '';
}

function render() {
  const inhoud = document.getElementById('inhoud');
  const fase = getData();
  if (!fase) return;
  let html = '';

  // Fase intro
  html += `<div class="fase-intro"><div class="fase-intro-icoon">${fase.intro.icoon}</div><div class="fase-intro-tekst">${fase.intro.tekst}</div></div>`;

  // Categorieën
  fase.categorieen.forEach((cat, i) => {
    const badgeKlassen = { stopt: 'stopt-chip', nieuw: 'nieuw-chip', let: 'let-chip' };
    const badgeClass = badgeKlassen[cat.badgeKleur] || 'let-chip';
    html += `<div class="categorie-kaart${i === 0 ? ' open' : ''}" style="animation-delay:${i * 0.05}s">
      <div class="categorie-header" onclick="toggleCategorie(this)">
        <div class="categorie-icoon" style="background:${cat.kleur}">${cat.icoon}</div>
        <div class="categorie-info">
          <div class="categorie-naam">${cat.naam}</div>
          <div class="categorie-samenvatting">${cat.samenvatting}</div>
        </div>
        <span class="${badgeClass}" style="font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0">${cat.badge}</span>
        <span class="categorie-pijl">▼</span>
      </div>
      <div class="categorie-body">
        <ul class="punt-lijst">
          ${cat.punten.map(p => `<li class="punt">
            <div class="punt-icoon" style="background:${p.kleur}">${p.icoon}</div>
            <div class="punt-tekst">${p.tekst}</div>
          </li>`).join('')}
        </ul>
        ${cat.infoBox ? `<div class="${cat.infoBox.type === 'amber' ? 'amber-box' : cat.infoBox.type === 'groen' ? 'groen-box' : 'info-box'}">${cat.infoBox.tekst}</div>` : ''}

        ${cat.extern ? `<a href="${cat.extern.url}" target="_blank" class="externe-link">${cat.extern.tekst} ↗</a>` : ''}
      </div>
    </div>`;
  });

  // Checklist
  if (fase.checklist) {
    const checkTitel = (window.Solidari && Solidari.i18n) ? Solidari.i18n.t('18-checklist-titel') : '✅ Checklist — klik aan wat je hebt geregeld';
    html += `<div class="checklist-wrap">
      <div class="checklist-titel">${checkTitel}</div>
      <ul class="checklist">
        ${fase.checklist.map((item, i) => `<li class="checklist-item" id="check-${huidigeFase}-${i}">
          <div class="check-box" onclick="toggleCheck(this)"></div>
          <div onclick="toggleCheck(this.previousElementSibling)">
            <div class="checklist-tekst">${item.tekst}</div>
            <div class="checklist-sub">${item.sub}</div>
          </div>
        </li>`).join('')}
      </ul>
    </div>`;
  }



  const disclaimer = (window.Solidari && Solidari.i18n) ? Solidari.i18n.t('18-disclaimer') : '⚠️ De informatie op deze pagina is gebaseerd op de regelgeving en bedragen van 2026. Regels kunnen veranderen. Controleer altijd de officiële bronnen (belastingdienst.nl, duo.nl, ind.nl) voor de meest actuele informatie. Solidari geeft geen juridisch of financieel advies.';
  html += `<div class="disclaimer">${disclaimer}</div>`;

  inhoud.innerHTML = html;
}

render();

};
