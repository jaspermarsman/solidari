<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naturalisatie Checker — Solidari</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>

    .pagina-header { padding-top: 64px; background: var(--groen); color: white; position: relative; overflow: hidden; }
    .pagina-header::before { content: '🇳🇱'; position: absolute; right: 8%; top: 50%; transform: translateY(-50%); font-size: 7rem; opacity: 0.07; pointer-events: none; }

    .header-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 1rem; opacity: 0.85; }
    .header-titel { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.6rem; }
    .header-sub { font-size: 1rem; opacity: 0.75; font-weight: 300; max-width: 480px; line-height: 1.7; }
    .voortgang-balk { background: rgba(255,255,255,0.08); height: 4px; }
    .voortgang-balk-vulling { height: 100%; background: var(--amber); transition: width 0.5s ease; }
    .hoofd { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .vraag-kaart { background: white; border: 1px solid var(--rand); border-radius: 20px; overflow: hidden; margin-bottom: 1.5rem; animation: inschuiven 0.4s ease both; }
    @keyframes inschuiven { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .vraag-header { padding: 1.5rem 1.8rem 1.2rem; border-bottom: 1px solid var(--rand); }
    .vraag-stap { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber-diep); margin-bottom: 0.5rem; }
    .vraag-tekst { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 600; color: var(--tekst); line-height: 1.3; }
    .vraag-uitleg { font-size: 0.82rem; color: var(--tekst-licht); margin-top: 6px; font-weight: 300; line-height: 1.6; }
    .antwoorden { padding: 1.2rem 1.8rem 1.5rem; display: flex; flex-direction: column; gap: 10px; }
    .antwoord-knop { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1.5px solid var(--rand); border-radius: 12px; background: var(--wit); cursor: pointer; text-align: left; font-family: 'Source Sans 3', sans-serif; font-size: 0.9rem; color: var(--tekst); transition: all 0.2s; width: 100%; }
    .antwoord-knop:hover { border-color: var(--groen); background: var(--groen-licht); transform: translateX(4px); }
    .antwoord-knop.nee:hover { border-color: var(--rood); background: var(--rood-licht); }
    .antwoord-knop.anders:hover { border-color: var(--amber); background: var(--amber-licht); }
    .antwoord-knop.info:hover { border-color: var(--blauw); background: var(--blauw-licht); }
    .antwoord-icoon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
    .antwoord-tekst { font-weight: 500; line-height: 1.3; }
    .antwoord-sub { font-size: 0.78rem; color: var(--tekst-licht); font-weight: 300; margin-top: 2px; }
    .geschiedenis-item { background: var(--wit-warm); border: 1px solid var(--rand); border-radius: 14px; padding: 0.9rem 1.4rem; margin-bottom: 0.7rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; opacity: 0.75; }
    .geschiedenis-vraag { font-size: 0.82rem; color: var(--tekst-zacht); flex: 1; }
    .geschiedenis-antwoord { font-size: 0.8rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; flex-shrink: 0; white-space: nowrap; }
    .ga-ja { background: var(--groen-licht); color: var(--groen); }
    .ga-nee { background: var(--rood-licht); color: var(--rood); }
    .ga-anders { background: var(--amber-licht); color: var(--amber-diep); }
    .ga-info { background: var(--blauw-licht); color: var(--blauw); }
    .resultaat-kaart { border-radius: 20px; overflow: hidden; animation: inschuiven 0.5s ease both; }
    .resultaat-header { padding: 2rem 2rem 1.5rem; color: white; }
    .resultaat-icoon-groot { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .resultaat-titel { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; }
    .resultaat-sub { font-size: 0.9rem; opacity: 0.85; font-weight: 300; line-height: 1.6; }

    .resultaat-positief .resultaat-header { background: var(--groen); }
    .resultaat-negatief .resultaat-header { background: #374151; }
    .resultaat-wacht .resultaat-header { background: var(--amber-diep); }
    .resultaat-route .resultaat-header { background: var(--paars); }

    .stap-tekst-res { font-size: 0.85rem; color: var(--tekst-zacht); line-height: 1.5; }

    .route-paden { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
    .route-pad { border: 1.5px solid var(--rand); border-radius: 12px; padding: 14px 16px; background: var(--wit-warm); }
    .route-pad-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .route-pad-nr { width: 28px; height: 28px; border-radius: 8px; background: var(--paars); color: white; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .route-pad-titel { font-weight: 600; font-size: 0.9rem; color: var(--tekst); }
    .route-pad-tekst { font-size: 0.8rem; color: var(--tekst-zacht); line-height: 1.5; padding-left: 38px; }
    .alternatief-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
    .alternatief-item { background: var(--wit-warm); border: 1px solid var(--rand); border-radius: 10px; padding: 12px; }
    .alternatief-naam { font-size: 0.82rem; font-weight: 600; color: var(--tekst); margin-bottom: 3px; }
    .alternatief-tekst { font-size: 0.75rem; color: var(--tekst-zacht); font-weight: 300; line-height: 1.4; }
    .info-box { background: var(--blauw-licht); border-left: 3px solid var(--blauw); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 0.82rem; color: var(--tekst-zacht); line-height: 1.5; }
    .amber-box { background: var(--amber-licht); border-left: 3px solid var(--amber); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 0.82rem; color: var(--tekst-zacht); line-height: 1.5; }
    .sectie-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--tekst-licht); margin-bottom: 0.6rem; }
    .actie-knoppen { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }
    .knop-primair { background: var(--groen); color: white; border: none; border-radius: 8px; padding: 11px 22px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'Source Sans 3', sans-serif; transition: all 0.2s; display: inline-block; }
    .knop-primair:hover { background: #234830; }
    .knop-secundair { background: transparent; color: var(--tekst); border: 1.5px solid var(--rand); border-radius: 8px; padding: 11px 22px; font-size: 0.9rem; font-weight: 500; cursor: pointer; font-family: 'Source Sans 3', sans-serif; transition: all 0.2s; }
    .knop-secundair:hover { border-color: var(--tekst-zacht); }
    .disclaimer { margin-top: 1.5rem; padding: 1rem 1.2rem; background: var(--wit-warm); border-radius: 10px; font-size: 0.75rem; color: var(--tekst-licht); line-height: 1.6; }
    @media (max-width: 600px) { .header-titel { font-size: 1.7rem; } .alternatief-grid { grid-template-columns: 1fr; } .antwoorden { padding: 1rem 1.2rem 1.2rem; } .vraag-header { padding: 1.2rem 1.2rem 1rem; } .resultaat-body { padding: 1.2rem 1.2rem 1.5rem; } }
  </style>
</head>

let geschiedenis = [];
let huidigVraagId = 'v1';
const totaalStappen = 9;

function render() {
  const hoofd = document.getElementById('hoofd');
  hoofd.innerHTML = '';
  geschiedenis.forEach(item => {
    const el = document.createElement('div');
    el.className = 'geschiedenis-item';
    const kl = item.klasse === 'ja' ? 'ga-ja' : item.klasse === 'nee' ? 'ga-nee' : item.klasse === 'info' ? 'ga-info' : 'ga-anders';
    el.innerHTML = `<span class="geschiedenis-vraag">${item.vraagTekst}</span><span class="geschiedenis-antwoord ${kl}">${item.antwoordTekst}</span>`;
    hoofd.appendChild(el);
  });
  if (huidigVraagId.startsWith('r_')) toonResultaat(huidigVraagId);
  else toonVraag(huidigVraagId);
  if (geschiedenis.length > 0) setTimeout(() => hoofd.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function toonVraag(id) {
  const v = vragen[id]; if (!v) return;
  const stapNr = parseInt(v.stap.match(/\d+/)?.[0]) || 1;
  document.getElementById('voortgang').style.width = ((stapNr / totaalStappen) * 100) + '%';
  const kaart = document.createElement('div');
  kaart.className = 'vraag-kaart';
  kaart.innerHTML = `
    <div class="vraag-header">
      <div class="vraag-stap">${v.stap}</div>
      <div class="vraag-tekst">${v.tekst}</div>
      ${v.uitleg ? `<div class="vraag-uitleg">${v.uitleg}</div>` : ''}
    </div>
    <div class="antwoorden">
      ${v.antwoorden.map((a, i) => `
        <button class="antwoord-knop ${a.klasse||''}" onclick="kiesAntwoord('${id}',${i})">
          <div class="antwoord-icoon" style="background:${a.klasse==='ja'?'var(--groen-licht)':a.klasse==='nee'?'var(--rood-licht)':a.klasse==='info'?'var(--blauw-licht)':'var(--amber-licht)'}">
            ${a.icoon}
          </div>
          <div>
            <div class="antwoord-tekst">${a.tekst}</div>
            ${a.sub?`<div class="antwoord-sub">${a.sub}</div>`:''}
          </div>
        </button>`).join('')}
    </div>`;
  document.getElementById('hoofd').appendChild(kaart);
  if (geschiedenis.length > 0) {
    const opnieuw = document.createElement('div');
    opnieuw.style.cssText = 'text-align:center;margin-top:0.5rem;';
    opnieuw.innerHTML = `<button class="knop-secundair" onclick="opnieuwBeginnen()" style="font-size:0.8rem;padding:7px 16px;">↺ Opnieuw beginnen</button>`;
    document.getElementById('hoofd').appendChild(opnieuw);
  }
}

function toonResultaat(id) {
  const res = resultaten[id]; if (!res) return;
  document.getElementById('voortgang').style.width = '100%';
  const kaart = document.createElement('div');
  kaart.className = `resultaat-kaart resultaat-${res.type}`;
  const disclaimer = `<div class="disclaimer">⚠️ Deze checker geeft een indicatie op basis van de IND-voorwaarden 2025. Er zijn altijd uitzonderingen en persoonlijke omstandigheden. Raadpleeg altijd een medewerker van de gemeente of VluchtelingenWerk voor persoonlijk advies.</div>`;
  const knoppen = `<div class="actie-knoppen"><a href="${res.link}" target="_blank" class="knop-primair">${res.linkTekst}</a><button class="knop-secundair" onclick="opnieuwBeginnen()">↺ Opnieuw beginnen</button></div>`;
  let body = '';
  if (res.type === 'positief') {
    body = `<div class="resultaat-body">
      ${res.info?`<div class="info-box">${res.info}</div>`:''}
      <div class="sectie-label">Volgende stappen</div>
      <ul class="stap-lijst">${res.stappen.map(s=>`<li class="stap-item-res"><span class="stap-nr-res">${s.nr}</span><span class="stap-tekst-res">${s.tekst}</span></li>`).join('')}</ul>
      ${knoppen}${disclaimer}</div>`;
  } else if (res.type === 'eu') {
    let infoH = (res.infoBoxen||[]).map(b=>`<div class="${b.type==='amber'?'amber-box':'info-box'}">${b.tekst}</div>`).join('');
    let stappenH = res.stappen ? `<div class="sectie-label">Wat kun je doen?</div><ul class="stap-lijst">${res.stappen.map(s=>`<li class="stap-item-res"><span class="stap-nr-res">${s.nr}</span><span class="stap-tekst-res">${s.tekst}</span></li>`).join('')}</ul>` : '';
    body = `<div class="resultaat-body">${infoH}${stappenH}${knoppen}${disclaimer}</div>`;
  } else if (res.type === 'route') {
    let infoH = (res.infoBoxen||[]).map(b=>`<div class="${b.type==='amber'?'amber-box':'info-box'}">${b.tekst}</div>`).join('');
    if (res.info) infoH += `<div class="info-box">${res.info}</div>`;
    let padenH = res.paden ? `<div class="sectie-label">De drie paden voor naturalisatie vanuit de Z-route</div><div class="route-paden">${res.paden.map(p=>`<div class="route-pad"><div class="route-pad-header"><div class="route-pad-nr">${p.nr}</div><div class="route-pad-titel">${p.titel}</div></div><div class="route-pad-tekst">${p.tekst}</div></div>`).join('')}</div>` : '';
    let stappenH = res.stappen ? `<div class="sectie-label" style="margin-top:1rem;">Wat kun je nu doen?</div><ul class="stap-lijst">${res.stappen.map(s=>`<li class="stap-item-res"><span class="stap-nr-res">${s.nr}</span><span class="stap-tekst-res">${s.tekst}</span></li>`).join('')}</ul>` : '';
    body = `<div class="resultaat-body">${infoH}${padenH}${stappenH}${knoppen}${disclaimer}</div>`;
  } else {
    body = `<div class="resultaat-body"><div class="alternatief-grid">${res.alternatieven.map(a=>`<div class="alternatief-item"><div class="alternatief-naam">${a.naam}</div><div class="alternatief-tekst">${a.tekst}</div></div>`).join('')}</div>${knoppen}${disclaimer}</div>`;
  }
  kaart.innerHTML = `<div class="resultaat-header"><div class="resultaat-icoon-groot">${res.icoon}</div><div class="resultaat-titel">${res.titel}</div><div class="resultaat-sub">${res.sub}</div></div>${body}`;
  document.getElementById('hoofd').appendChild(kaart);
}

function kiesAntwoord(vraagId, i) {
  const v = vragen[vraagId], a = v.antwoorden[i];
  geschiedenis.push({ vraagId, vraagTekst: v.tekst, antwoordTekst: a.tekst, klasse: a.klasse });
  huidigVraagId = a.volgende;
  render();
}

function opnieuwBeginnen() {
  geschiedenis = []; huidigVraagId = 'v1';
  document.getElementById('voortgang').style.width = '0%';
  render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
