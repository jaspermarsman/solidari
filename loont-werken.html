<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loont Werken? — Solidari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    :root {
      --rood:#DC2626;--rood-licht:#FEF2F2;
      --blauw:#2563EB;--blauw-licht:#EFF6FF;
      --chat-bg:#EFECE6;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{background:var(--chat-bg);color:var(--tekst);font-family:'Source Sans 3',sans-serif;font-weight:400;display:flex;flex-direction:column;}

    /* VOORTGANGSBALK */
    .voortgang-strip{height:3px;background:var(--rand);flex-shrink:0;}
    .voortgang-vul{height:100%;background:var(--amber);transition:width 0.4s ease;}

    /* CHAT */
    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:680px;margin:0 auto;width:100%;padding:0 1rem;min-height:0;padding-top:64px;}
    .berichten{flex:1;overflow-y:auto;padding:1.2rem 0 0.5rem;display:flex;flex-direction:column;gap:0.6rem;scroll-behavior:smooth;}
    .berichten::-webkit-scrollbar{width:4px;}
    .berichten::-webkit-scrollbar-thumb{background:var(--rand);border-radius:4px;}

    /* BERICHTEN */
    .bericht-sol{display:flex;align-items:flex-end;gap:8px;max-width:88%;align-self:flex-start;animation:inSchuiven .25s ease both;}
    .sol-avatar{width:32px;height:32px;background:var(--groen);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
    .bel-sol{background:white;border-radius:18px 18px 18px 4px;padding:10px 14px;font-size:.92rem;line-height:1.55;color:var(--tekst);box-shadow:0 1px 2px rgba(0,0,0,.06);}
    .bel-sol.reactie{background:var(--groen-licht);border:1px solid rgba(45,90,61,.12);font-size:.85rem;color:var(--tekst-zacht);}
    .bel-sol.info{background:var(--blauw-licht);border:1px solid rgba(37,99,235,.15);font-size:.82rem;color:var(--blauw);}
    .bel-sol.waarschuwing{background:var(--rood-licht);border:1px solid rgba(220,38,38,.15);font-size:.82rem;color:var(--rood);}
    .bericht-user{align-self:flex-end;max-width:78%;animation:inSchuiven .2s ease both;}
    .bel-user{background:var(--groen);border-radius:18px 18px 4px 18px;padding:10px 14px;font-size:.92rem;color:white;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,.1);}

    /* TYPING */
    .typing{display:flex;align-items:flex-end;gap:8px;align-self:flex-start;}
    .typing-dots{background:white;border-radius:18px;padding:12px 16px;display:flex;gap:4px;align-items:center;}
    .typing-dots span{width:6px;height:6px;background:var(--tekst-licht);border-radius:50%;animation:tikken 1.2s infinite;}
    .typing-dots span:nth-child(2){animation-delay:.2s;}
    .typing-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes tikken{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
    @keyframes inSchuiven{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    /* INVOER */
    .invoer-zone{padding:.8rem 0 1rem;flex-shrink:0;}
    .keuze-rij{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
    .keuze-btn{background:white;border:1.5px solid var(--rand);border-radius:20px;padding:8px 16px;font-size:.88rem;font-weight:500;cursor:pointer;color:var(--tekst);font-family:'Source Sans 3',sans-serif;transition:all .18s;display:flex;align-items:center;gap:6px;}
    .keuze-btn:hover{border-color:var(--groen);background:var(--groen-licht);color:var(--groen);}

    /* GETAL INVOER */
    .bedrag-rij{display:flex;gap:8px;align-items:stretch;}
    .bedrag-wrap{flex:1;display:flex;align-items:center;background:white;border:2px solid var(--rand);border-radius:14px;overflow:hidden;transition:border-color .2s;}
    .bedrag-wrap:focus-within{border-color:var(--amber);}
    .bedrag-euro{padding:0 14px;font-size:1.3rem;font-weight:600;color:var(--tekst-licht);background:var(--wit-warm);align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--rand);}
    .bedrag-input{flex:1;padding:14px 12px;font-size:1.3rem;border:none;background:transparent;color:var(--tekst);outline:none;font-family:'Source Sans 3',sans-serif;font-weight:500;width:80px;}
    .bedrag-input::placeholder{color:var(--tekst-licht);font-weight:300;}
    .stuur-btn{padding:0 20px;background:var(--groen);border:none;border-radius:14px;cursor:pointer;color:white;font-size:1.2rem;transition:all .18s;display:flex;align-items:center;}
    .stuur-btn:hover{background:#234830;}
    .overslaan-link{text-align:center;font-size:.78rem;color:var(--tekst-licht);margin-top:6px;cursor:pointer;background:none;border:none;font-family:'Source Sans 3',sans-serif;width:100%;display:block;transition:color .2s;}
    .overslaan-link:hover{color:var(--tekst-zacht);}

    /* RESULTAATKAART */
    .res-kaart{background:white;border-radius:18px 18px 18px 4px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);width:100%;}
    .res-top{background:var(--groen);padding:1rem 1.2rem;color:white;}
    .res-top-titel{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:2px;}
    .res-top-sub{font-size:.75rem;opacity:.7;}
    .res-vergelijk{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rand);}
    .res-kolom{padding:.9rem 1rem;text-align:center;}
    .res-kolom+.res-kolom{border-left:1px solid var(--rand);}
    .res-kolom-lbl{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tekst-licht);margin-bottom:4px;}
    .res-kolom.werk .res-kolom-lbl{color:var(--groen);}
    .res-kolom-getal{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;line-height:1;}
    .res-kolom.werk .res-kolom-getal{color:var(--groen);}
    .res-banner{padding:.8rem 1.2rem;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--rand);}
    .res-banner.positief{background:var(--groen);color:white;}
    .res-banner.negatief{background:var(--rood-licht);color:var(--rood);}
    .res-banner.neutraal{background:var(--amber-licht);color:var(--amber-diep);}
    .res-uitsp{padding:.4rem 1.2rem .8rem;}
    .uitsp-rij{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--rand);font-size:.82rem;}
    .uitsp-rij:last-child{border-bottom:none;}
    .uitsp-naam{color:var(--tekst-zacht);display:flex;align-items:center;gap:6px;flex:1;}
    .uitsp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .uitsp-bed{display:flex;gap:16px;flex-shrink:0;}
    .uitsp-nu{color:var(--tekst-licht);font-size:.78rem;width:62px;text-align:right;}
    .uitsp-werk{font-weight:600;width:62px;text-align:right;}
    .uitsp-hdr{display:flex;justify-content:space-between;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tekst-licht);padding:6px 0 4px;border-bottom:1px solid var(--rand);margin-bottom:2px;}
    .uitsp-rij.totaal .uitsp-naam{font-weight:700;color:var(--tekst);}
    .uitsp-rij.totaal .uitsp-werk{color:var(--groen);}
    .res-motivatie{padding:.8rem 1.2rem;background:var(--groen-licht);border-top:1px solid rgba(45,90,61,.12);}
    .res-motivatie-titel{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:600;color:var(--groen);margin-bottom:4px;}
    .res-motivatie-txt{font-size:.8rem;color:var(--tekst-zacht);line-height:1.6;}
    .res-omslag-rij{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-radius:8px;overflow:hidden;border:1px solid rgba(45,90,61,.2);margin:.6rem 0;}
    .res-omslag-blok{padding:10px;background:white;text-align:center;border-right:1px solid rgba(45,90,61,.12);}
    .res-omslag-blok:last-child{border-right:none;background:var(--groen);}
    .res-omslag-getal{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--groen);line-height:1;margin-bottom:3px;}
    .res-omslag-blok:last-child .res-omslag-getal{color:var(--amber);}
    .res-omslag-lbl{font-size:.65rem;color:var(--tekst-licht);line-height:1.3;}
    .res-omslag-blok:last-child .res-omslag-lbl{color:rgba(255,255,255,.75);}
    .res-disc{padding:.6rem 1.2rem;font-size:.7rem;color:var(--tekst-licht);line-height:1.5;border-top:1px solid var(--rand);}
    .res-opnieuw{width:100%;padding:10px;background:none;border:1px solid var(--rand);border-radius:10px;font-size:.82rem;cursor:pointer;font-family:'Source Sans 3',sans-serif;color:var(--tekst-licht);margin:.8rem 1.2rem;width:calc(100% - 2.4rem);transition:all .2s;}
    .res-opnieuw:hover{color:var(--tekst-zacht);border-color:var(--tekst-licht);}

    @media(max-width:480px){.chat-wrap{padding:0 .6rem;padding-top:64px;}}
  </style>
</head>

// NORMEN 2026
// ══════════════════════════════════════════════════════
const NORMEN={
  zorgtoeslag:{dr_single:40857,dr_partner:51407,max_single:128,max_partner:244},
  huurtoeslag:{huurgrens:880.66,kwal_grens:454.47,aftop_12:650.43,aftop_3plus:697.46,
    norm_single:242,norm_partner:260,max_i_single:31875,max_i_partner:43675},
  kgb:{k1:1530,k2:1019,k3:376,grens:24557,afbouw:0.0683},
  lh:{s1g:38441,s1t:.3597,s2t:.4950,ahk:3099,ahk_s:24813,ahk_e:75518,ak:5052,ak_s:24813,ak_oe:24813,ak_as:43071,ak_ae:124935},
};
const BIJSTAND={alleenstaand_21_aow:1401.50,gehuwd_21_aow:2002.13,alleenstaand_aow:1564.69,gehuwd_aow:2144.16,jong_single:345.99,jong_gehuwd:691.98};
const JONG_AANV=746.45, WML=14.71, JEUGD={18:7.36,19:8.83,20:11.77}, AKW=105;
const KD_PCT={2:.50,3:.4333,4:.40,5:.38};

// ══════════════════════════════════════════════════════
// STAAT
// ══════════════════════════════════════════════════════
let taal='nl';
const staat={situatie:null,leeftijd:null,kostendelers:null,kinderen:null,huur:0,vakantiegeld:false,bruto:null,uren:null};

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function s(k){return(T[taal]||T.nl)[k]||T.nl[k]||k;}
function fmt(n){return'€'+Math.round(n).toLocaleString('nl-NL');}
function voortgang(pct){document.getElementById('voortgang').style.width=pct+'%';}

function berekenNorm(){
  const l=staat.leeftijd,si=staat.situatie;
  if(l==='jong'){return si==='gehuwd'?BIJSTAND.jong_gehuwd:BIJSTAND.jong_single;}
  if(si==='kd'){const p=KD_PCT[Math.min(staat.kostendelers,5)]||.38;return Math.round(2002.13*p*100)/100;}
  return BIJSTAND[(si==='gehuwd'?'gehuwd':'alleenstaand')+'_'+l]||BIJSTAND.alleenstaand_21_aow;
}
function berekenNetto(bruto){
  if(bruto<=0)return 0;
  const be=staat.vakantiegeld?bruto/1.08:bruto, bj=be*12, L=NORMEN.lh;
  let bel=bj<=L.s1g?bj*L.s1t:L.s1g*L.s1t+(bj-L.s1g)*L.s2t;
  let ahk=L.ahk; if(bj>L.ahk_s)ahk=Math.max(0,L.ahk-(Math.min(bj,L.ahk_e)-L.ahk_s)/(L.ahk_e-L.ahk_s)*L.ahk);
  let ak=0;
  if(bj<=L.ak_oe)ak=bj/L.ak_oe*L.ak;
  else if(bj<=L.ak_as)ak=L.ak;
  else if(bj<=L.ak_ae)ak=Math.max(0,L.ak*(1-(bj-L.ak_as)/(L.ak_ae-L.ak_as)));
  return Math.round(Math.max(0,bj-bel+ahk+ak)*(staat.vakantiegeld?1:1.08)/12);
}
function berekenZt(ji,sit){
  const Z=NORMEN.zorgtoeslag,dr=sit==='single'?Z.dr_single:Z.dr_partner,mx=sit==='single'?Z.max_single:Z.max_partner;
  return ji>=dr?0:Math.round(mx*(1-ji/dr));
}
function berekenHt(ji,huur,sit,kind){
  const H=NORMEN.huurtoeslag;
  if(huur>H.huurgrens||huur<H.kwal_grens)return 0;
  const mI=sit==='single'?H.max_i_single:H.max_i_partner;
  if(ji>mI)return 0;
  const aftop=kind>=3?H.aftop_3plus:H.aftop_12, nh=sit==='single'?H.norm_single:H.norm_partner;
  return Math.round(Math.max(0,Math.min(huur,aftop)-nh)*Math.max(0,1-Math.max(0,ji-15000)/(mI-15000)));
}
function berekenKgb(ji,kind){
  if(kind===0)return 0;
  const K=NORMEN.kgb;
  let b=0;if(kind>=1)b+=K.k1;if(kind>=2)b+=K.k2;if(kind>=3)b+=K.k3;
  return Math.round(Math.max(0,b-(ji>K.grens?(ji-K.grens)*K.afbouw:0))/12);
}
function berekenOmslagpunt(bijstand,huur,kind,sit){
  const ul=staat.leeftijd==='jong'?JEUGD[19]:WML;
  const bj0=bijstand*12, tot0=bijstand+berekenZt(bj0,sit)+berekenHt(bj0,huur,sit,kind)+berekenKgb(bj0,kind);
  for(let u=1;u<=40;u++){
    const brMnd=ul*u*(52/12),ntMnd=berekenNetto(brMnd),brJ=brMnd*12;
    const aanv=Math.max(0,bijstand-ntMnd);
    const totW=ntMnd+aanv+berekenZt(brJ,sit)+berekenHt(brJ,huur,sit,kind)+berekenKgb(brJ,kind);
    if(aanv<50&&totW>=tot0+50)return{uren:u,brutoMnd:Math.round(brMnd),totaalWerk:Math.round(totW),totaalBijstand:Math.round(tot0),ul};
  }
  return null;
}

const B=()=>document.getElementById('berichten');
const IZ=()=>document.getElementById('invoer-zone');

function scrollNaar(){setTimeout(()=>B().scrollTo({top:B().scrollHeight,behavior:'smooth'}),80);}

function solBericht(tekst,klasse=''){
  const d=document.createElement('div');d.className='bericht-sol';
  d.innerHTML=`<div class="sol-avatar">☀️</div><div class="bel-sol ${klasse}">${tekst}</div>`;
  B().appendChild(d);scrollNaar();return d;
}
function userBericht(tekst){
  const d=document.createElement('div');d.className='bericht-user';
  d.innerHTML=`<div class="bel-user">${tekst}</div>`;
  B().appendChild(d);scrollNaar();
}
function typingEl(){
  const d=document.createElement('div');d.className='typing';
  d.innerHTML=`<div class="sol-avatar">☀️</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  B().appendChild(d);scrollNaar();return d;
}

async function sol(tekst,vertraging=320,klasse=''){
  const ty=typingEl();
  await new Promise(r=>setTimeout(r,vertraging));
  ty.remove();
  return solBericht(tekst,klasse);
}

function toonKeuzes(opties,onKlik){
  IZ().innerHTML='';
  const rij=document.createElement('div');rij.className='keuze-rij';
  opties.forEach(o=>{
    const b=document.createElement('button');b.className='keuze-btn';b.innerHTML=o.label;
    b.onclick=()=>{IZ().innerHTML='';onKlik(o);};
    rij.appendChild(b);
  });
  IZ().appendChild(rij);scrollNaar();
}

function toonGetallnvoer(placeholder,hint,onKlik,skipLabel){
  IZ().innerHTML='';
  const wrap=document.createElement('div');
  wrap.innerHTML=`
    <div class="bedrag-rij">
      <div class="bedrag-wrap"><div class="bedrag-euro">€</div><input type="number" class="bedrag-input" id="getaal-inp" placeholder="${placeholder}" min="0" max="5000"></div>
      <button class="stuur-btn" id="stuur-btn">→</button>
    </div>
    ${hint?`<div style="font-size:.75rem;color:var(--tekst-licht);margin-top:5px;">${hint}</div>`:''}
    ${skipLabel?`<button class="overslaan-link" id="skip-btn">${skipLabel}</button>`:''}`;
  IZ().appendChild(wrap);
  const inp=document.getElementById('getaal-inp');
  const go=()=>{const v=parseFloat(inp.value)||0;IZ().innerHTML='';onKlik(v);};
  document.getElementById('stuur-btn').onclick=go;
  inp.onkeydown=e=>{if(e.key==='Enter')go();};
  if(skipLabel)document.getElementById('skip-btn').onclick=()=>{IZ().innerHTML='';onKlik(0,true);};
  inp.focus();scrollNaar();
}

  );

async function stap_uren(){
  voortgang(70);
  await sol(s('q_uren'),300);
  const urenWaarden=[12,20,32,40];
  // Toon ook hint over auto-invullen
  await sol(s('uren_hint'),200,'reactie');
  toonKeuzes(
    s('uren_keuzes').map((l,i)=>({label:l,val:urenWaarden[i]})),
    async o=>{
      staat.uren=o.val;
      userBericht(o.label);
      // Auto-invullen bruto op basis van minimumloon
      const ul=staat.leeftijd==='jong'?JEUGD[19]:WML;
      const autobruto=Math.round(ul*o.val*(52/12));
      staat.bruto=staat.vakantiegeld?Math.round(autobruto*1.08):autobruto;
      stap_bruto();
    }
  );
}

async function stap_bruto(){
  voortgang(82);
  await sol(s('q_bruto'),300);
  // Pre-fill met auto-berekend minimumloon
  IZ().innerHTML='';
  const wrap=document.createElement('div');
  wrap.innerHTML=`
    <div class="bedrag-rij">
      <div class="bedrag-wrap"><div class="bedrag-euro">€</div><input type="number" class="bedrag-input" id="bruto-inp" value="${staat.bruto||''}" min="0" max="10000"></div>
      <button class="stuur-btn" id="stuur-btn">→</button>
    </div>
    <div style="font-size:.75rem;color:var(--tekst-licht);margin-top:5px;">${s('bruto_hint')}</div>`;
  IZ().appendChild(wrap);
  const inp=document.getElementById('bruto-inp');
  const go=async()=>{
    const v=parseFloat(inp.value)||0;
    if(v<=0){inp.style.borderColor='var(--rood)';return;}
    staat.bruto=v;
    IZ().innerHTML='';
    userBericht(fmt(v));
    // Validatie: ver onder minimumloon?
    const ul=staat.leeftijd==='jong'?JEUGD[19]:WML;
    const minRef=ul*staat.uren*(52/12)*0.5;
    if(v<minRef) await sol('⚠️ Dat ligt ver onder het minimumloon voor '+staat.uren+' uur per week. Ik reken er wel mee door.',300,'waarschuwing');
    stap_berekenen();
  };
  document.getElementById('stuur-btn').onclick=go;
  inp.onkeydown=e=>{if(e.key==='Enter')go();};
  inp.focus();inp.select();scrollNaar();
}

async function stap_berekenen(){
  voortgang(95);
  await sol(s('rekenen'),400);

  // ── BEREKENING ──
  const sit=staat.situatie==='alleenstaand'?'single':'partner';
  const bijstand=berekenNorm();
  const bj0=bijstand*12;
  const zt0=berekenZt(bj0,sit),ht0=berekenHt(bj0,staat.huur,sit,staat.kinderen),kgb0=berekenKgb(bj0,staat.kinderen),akw=staat.kinderen>0?staat.kinderen*AKW:0;
  const tot0=bijstand+zt0+ht0+kgb0+akw;

  const netto=berekenNetto(staat.bruto);
  const beExcl=staat.vakantiegeld?staat.bruto/1.08:staat.bruto;
  const brJ=beExcl*12;
  const zt1=berekenZt(brJ,sit),ht1=berekenHt(brJ,staat.huur,sit,staat.kinderen),kgb1=berekenKgb(brJ,staat.kinderen);
  const bijstand1=Math.max(0,bijstand-netto);
  const tot1=netto+bijstand1+zt1+ht1+kgb1+akw;
  const verschil=tot1-tot0, vPct=tot0>0?((verschil/tot0)*100).toFixed(1):0;

  // ── BANNER ──
  let bannerKls,bannerTxt,bannerSub;
  if(verschil>50){bannerKls='positief';bannerTxt=s('res_meer').replace('{x}',fmt(verschil));bannerSub=s('res_meer_sub').replace('{p}',vPct);}
  else if(verschil<-50){bannerKls='negatief';bannerTxt=s('res_minder').replace('{x}',fmt(Math.abs(verschil)));bannerSub=s('res_minder_sub');}
  else{bannerKls='neutraal';bannerTxt=s('res_gelijk');bannerSub=s('res_gelijk_sub');}

  // ── UITSPLITSING ──
  function uitspRij(kleur,naam,nu,wk,opmerking=''){
    const wKleur=wk>nu?'color:var(--groen)':wk<nu?'color:var(--rood)':'';
    return`<div class="uitsp-rij">
      <div class="uitsp-naam"><div class="uitsp-dot" style="background:${kleur};border:1px solid var(--rand)"></div>${naam}${opmerking?`<span style="font-size:.68rem;color:var(--tekst-licht);margin-left:4px">${opmerking}</span>`:''}</div>
      <div class="uitsp-bed"><div class="uitsp-nu">${nu>0?fmt(nu):'—'}</div><div class="uitsp-werk" style="${wKleur}">${wk>0?fmt(wk):'—'}</div></div>
    </div>`;
  }
  function uitspVast(kleur,naam,bed){
    return`<div class="uitsp-rij">
      <div class="uitsp-naam"><div class="uitsp-dot" style="background:${kleur};border:1px solid var(--rand)"></div>${naam}<span style="font-size:.68rem;color:var(--tekst-licht);margin-left:4px">${s('ongewijzigd')}</span></div>
      <div class="uitsp-bed"><div class="uitsp-nu">${bed>0?fmt(bed):'—'}</div><div class="uitsp-werk">${bed>0?fmt(bed):'—'}</div></div>
    </div>`;
  }
  const huurOpmerking=staat.huur<454||staat.huur>880?s('huur_buiten'):'';

  // ── OMSLAGPUNT ──
  const ul=staat.leeftijd==='jong'?JEUGD[19]:WML;
  const wmlMnd=Math.round(ul*staat.uren*(52/12));
  const beExclBruto=staat.vakantiegeld?staat.bruto/1.08:staat.bruto;
  const toonOmsl=Math.abs(beExclBruto-wmlMnd)/wmlMnd<0.4;
  let motivatieHtml='';
  if(toonOmsl){
    const o=berekenOmslagpunt(bijstand,staat.huur,staat.kinderen,sit);
    if(!o){
      motivatieHtml=`<div class="res-motivatie"><div class="res-motivatie-titel">${s('val_titel')}</div><div class="res-motivatie-txt">${s('val_txt')}</div></div>`;
    } else {
      const extra=o.totaalWerk-o.totaalBijstand;
      motivatieHtml=`<div class="res-motivatie">
        <div class="res-motivatie-titel">${s('omsl_titel')}</div>
        <div class="res-motivatie-txt">${s('omsl_basis').replace('{u}',o.ul.toFixed(2).replace('.',','))}</div>
        <div class="res-omslag-rij">
          <div class="res-omslag-blok"><div class="res-omslag-getal">${o.uren}u</div><div class="res-omslag-lbl">${s('omsl_uren_lbl')}</div></div>
          <div class="res-omslag-blok"><div class="res-omslag-getal">${fmt(o.brutoMnd)}</div><div class="res-omslag-lbl">${s('omsl_bruto_lbl').replace('{n}',o.uren)}</div></div>
          <div class="res-omslag-blok"><div class="res-omslag-getal">+${fmt(extra)}</div><div class="res-omslag-lbl">${s('omsl_extra_lbl')}</div></div>
        </div>
      </div>`;
    }
  }
  const toonAV=verschil<100&&staat.bruto>0;

  // ── KAART HTML ──
  const kaartEl=document.createElement('div');kaartEl.className='bericht-sol';kaartEl.style.maxWidth='100%';
  kaartEl.innerHTML=`<div class="sol-avatar">☀️</div>
  <div class="res-kaart">
    <div class="res-top"><div class="res-top-titel">💶 ${s('res_nu')} vs. ${s('res_werk')}</div><div class="res-top-sub">${s('res_mnd')}</div></div>
    <div class="res-vergelijk">
      <div class="res-kolom"><div class="res-kolom-lbl">${s('res_nu')}</div><div class="res-kolom-getal">${fmt(tot0)}</div></div>
      <div class="res-kolom werk"><div class="res-kolom-lbl">${s('res_werk')}</div><div class="res-kolom-getal">${fmt(tot1)}</div></div>
    </div>
    <div class="res-banner ${bannerKls}">${bannerTxt}<br><span style="font-weight:400;font-size:.8rem;opacity:.85">${bannerSub}</span></div>
    <div class="res-uitsp">
      <div class="uitsp-hdr"><span>${s('res_bron')}</span><div style="display:flex;gap:16px"><span style="width:62px;text-align:right">${s('res_nu')}</span><span style="width:62px;text-align:right">${s('res_werk')}</span></div></div>
      ${staat.bruto>0?uitspRij('#EBF3EE',s('netto_sal'),0,netto):''}
      ${uitspRij('#F5F2EC',s('bijstand_lbl'),bijstand,bijstand1)}
      ${uitspRij('#FDF3E0',s('zt_lbl'),zt0,zt1)}
      ${uitspRij('#EFF6FF',s('ht_lbl'),ht0,ht1,huurOpmerking)}
      ${staat.kinderen>0?uitspRij('#F5F3FF',s('kgb_lbl'),kgb0,kgb1):''}
      ${staat.kinderen>0?uitspVast('#FFE4F0',s('akw_lbl'),akw):''}
      <div class="uitsp-rij totaal"><div class="uitsp-naam"><strong>Totaal</strong></div><div class="uitsp-bed"><div class="uitsp-nu"><strong>${fmt(tot0)}</strong></div><div class="uitsp-werk">${fmt(tot1)}</div></div></div>
    </div>
    ${motivatieHtml}
    ${toonAV?`<div style="padding:.8rem 1.2rem;background:var(--amber-licht);border-top:1px solid rgba(232,160,32,.2)"><div style="font-weight:700;font-size:.85rem;color:var(--amber-diep);margin-bottom:3px">${s('av_titel')}</div><div style="font-size:.78rem;color:var(--tekst-zacht);line-height:1.55">${s('av_txt')}</div></div>`:''}
    <div class="res-disc">${s('disc')}</div>
    <button class="res-opnieuw" onclick="start()">${s('opnieuw')}</button>
  </div>`;
  B().appendChild(kaartEl);

  // Advies
  await sol(s('advies'),600,'reactie');
  voortgang(100);
  IZ().innerHTML=`<div style="text-align:center;padding:.5rem 0"><button class="overslaan-link" onclick="start()">${s('opnieuw')}</button></div>`;
  scrollNaar();
}

// TAAL

function setTaal(code,btn){
  taal=code.toLowerCase();
  document.querySelectorAll('.taal-btn').forEach(b=>b.classList.remove('actief'));
  if(btn)btn.classList.add('actief');
  if(window.Solidari&&Solidari.i18n)Solidari.i18n.passToe(code.toUpperCase());
  start();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  if(window.Solidari&&Solidari.i18n)Solidari.i18n.init();
});

try{const op=localStorage.getItem('solidari-taal');if(op){taal=op.toLowerCase();}}catch(e){}
start();
</script>
